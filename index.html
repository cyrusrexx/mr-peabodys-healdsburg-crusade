// ─── FOX AI ───
function updateFoxes(dt) {
  foxes.forEach(f => {
    f.anim += dt;
    f.stateTimer -= dt;

    if (f.state === 'idle') {
      f.vx = 0;
      if (f.stateTimer <= 0) {
        f.state = 'trotting';
        f.facing = Math.random() > 0.5 ? 1 : -1;
        f.stateTimer = rand(2, 4);
      }
      // Check for nearby pigeons
      let closest = null, closestDist = 400;
      enemies.forEach(e => {
        if (e.type === 'pigeon' && e.alive) {
          const d = Math.abs(e.x - f.x);
          if (d < closestDist) { closest = e; closestDist = d; }
        }
      });
      if (closest) {
        f.target = closest;
        f.state = 'chasing_bird';
        f.stateTimer = 5;
      }
    } else if (f.state === 'trotting') {
      f.vx = f.facing * 60;
      if (f.stateTimer <= 0) {
        f.state = 'idle';
        f.stateTimer = rand(1, 3);
      }
      // Check for nearby pigeons
      let closest = null, closestDist = 400;
      enemies.forEach(e => {
        if (e.type === 'pigeon' && e.alive) {
          const d = Math.abs(e.x - f.x);
          if (d < closestDist) { closest = e; closestDist = d; }
        }
      });
      if (closest) {
        f.target = closest;
        f.state = 'chasing_bird';
        f.stateTimer = 5;
      }
    } else if (f.state === 'chasing_bird') {
      if (!f.target || !f.target.alive) {
        f.state = 'idle';
        f.stateTimer = rand(1, 2);
        f.target = null;
      } else {
        const dx = f.target.x - f.x;
        f.facing = dx > 0 ? 1 : -1;
        f.vx = f.facing * 140;
        // Catch pigeon
        if (Math.abs(dx) < 30 && Math.abs(f.target.y - f.y) < 80) {
          f.target.alive = false;
          f.state = 'idle';
          f.stateTimer = rand(2, 4);
          f.target = null;
        }
      }
      if (f.stateTimer <= 0) {
        f.state = 'idle';
        f.stateTimer = rand(1, 3);
        f.target = null;
      }
    }

    f.x += f.vx * dt;
    // Keep in world bounds
    if (f.x < 50) { f.x = 50; f.facing = 1; }
    if (f.x > WORLD_W - 50) { f.x = WORLD_W - 50; f.facing = -1; }
  });
}

// ─── RACCOON AI ───
function updateRaccoons(dt) {
  raccoons.forEach(r => {
    r.anim += dt;
    r.stateTimer -= dt;

    if (r.state === 'wandering') {
      r.vx = r.facing * 30;
      if (r.stateTimer <= 0) {
        r.facing *= -1;
        r.stateTimer = rand(2, 5);
      }
      // Check for nearby upright trash can
      let closest = null, closestDist = 300;
      trashCans.forEach(tc => {
        if (!tc.knocked) {
          const d = Math.abs(tc.x - r.x);
          if (d < closestDist) { closest = tc; closestDist = d; }
        }
      });
      if (closest) {
        r.target = closest;
        r.state = 'approaching';
        r.stateTimer = 6;
      }
    } else if (r.state === 'approaching') {
      if (!r.target || r.target.knocked) {
        r.state = 'wandering';
        r.stateTimer = rand(2, 4);
        r.target = null;
      } else {
        const dx = r.target.x - r.x;
        r.facing = dx > 0 ? 1 : -1;
        r.vx = r.facing * 50;
        // Reach trash can
        if (Math.abs(dx) < 25) {
          r.state = 'knocking';
          r.stateTimer = 1.0;
          r.vx = 0;
        }
      }
      if (r.stateTimer <= 0) {
        r.state = 'wandering';
        r.stateTimer = rand(2, 4);
        r.target = null;
      }
    } else if (r.state === 'knocking') {
      r.vx = 0;
      if (r.stateTimer <= 0) {
        if (r.target && !r.target.knocked) {
          r.target.knocked = true;
          r.target.spilledFood = true;
          r.target.foodEaten = false;
          r.target.foodX = r.target.x + rand(-20, 20);
          r.target.foodY = GROUND_Y - 10;
        }
        r.state = 'fleeing';
        r.facing = Math.random() > 0.5 ? 1 : -1;
        r.stateTimer = 2;
        r.target = null;
      }
    } else if (r.state === 'fleeing') {
      r.vx = r.facing * 120;
      if (r.stateTimer <= 0) {
        r.state = 'wandering';
        r.stateTimer = rand(3, 6);
      }
    }

    r.x += r.vx * dt;
    // Keep in world bounds
    if (r.x < 50) { r.x = 50; r.facing = 1; }
    if (r.x > WORLD_W - 50) { r.x = WORLD_W - 50; r.facing = -1; }
  });
}

// ─── GAME LOGIC UPDATE ───
function updateGame(dt) {
  gameTime += dt;
  difficulty = 1 + Math.floor(camera.x / 2000) * 0.2;

  // Player input
  const moveLeft = keys['ArrowLeft'] || keys['KeyA'] || touchAction.left;
  const moveRight = keys['ArrowRight'] || keys['KeyD'] || touchAction.right;
  const jumpKey = justPressed['ArrowUp'] || justPressed['KeyW'] || touchJumpJustPressed;
  const attackKey = justPressed['Space'] || justPressed['KeyX'] || justPressed['ShiftLeft'] || justPressed['ShiftRight'] || justPressed['KeyZ'] || touchAttackJustPressed;

  // If napping, skip normal input and handle nap
  if (isNapping) {
    napTimer += dt;
    napBubble += dt * 3;
    player.vx = 0;
    player.running = false;
    if (napTimer >= NAP_DURATION) {
      isNapping = false;
      stamina = STAMINA_MAX;
      addFloatingText(player.x, player.y - 60, 'FULLY RESTED!', '#4CAF50');
      spawnParticles(player.x, player.y - 30, '#4CAF50', 10, 120, 120);
    }
    // Any input cancels nap early
    if (moveLeft || moveRight || jumpKey || attackKey) {
      isNapping = false;
      // Partial restore based on how long they napped
      stamina = Math.min(STAMINA_MAX, stamina + (napTimer / NAP_DURATION) * STAMINA_MAX);
    }
    if (isNapping) {
      // Skip rest of input processing while napping
      clearJustPressed();
      return;
    }
  }

  // Effective run speed with speed boost
  const effectiveSpeed = RUN_SPEED + speedBoostLevel * 30 + (shakeSpeedTimer > 0 ? 120 : 0);

  // Horizontal movement
  if (moveLeft) {
    player.vx = -effectiveSpeed;
    player.facing = -1;
    player.running = true;
  } else if (moveRight) {
    player.vx = effectiveSpeed;
    player.facing = 1;
    player.running = true;
  } else {
    player.vx *= FRICTION;
    if (Math.abs(player.vx) < 10) player.vx = 0;
    player.running = false;
  }

  // Burger shop entry (BEFORE jump check so up-arrow enters shop, not jumps)
  if (burgerShop) {
    const nearDoor = Math.abs(player.x - burgerShop.doorX) < 35 && player.grounded;
    burgerShop.playerNear = nearDoor;
    if (nearDoor && jumpKey) {
      gameState = STATE.SHOP;
      shopCursor = 0;
      // Show the EXIT SHOP button
      var exitBtn = document.getElementById('exit-shop-btn');
      if (exitBtn) exitBtn.style.display = 'block';
      // Consume the key so the player doesn't jump on exit
      justPressed['ArrowUp'] = false;
      justPressed['KeyW'] = false;
      touchJumpJustPressed = false;
      return; // skip rest of updateGame this frame
    }
  }

  // Jump (boosted by watermelons)
  const effectiveJumpVel = JUMP_VEL - jumpBoostLevel * 40;
  if (jumpKey && player.grounded) {
    player.vy = effectiveJumpVel;
    player.grounded = false;
    player.jumping = true;
    playJump();
  }

  // Attack
  if (attackKey && player.attackCooldown <= 0) {
    player.attacking = true;
    player.attackTimer = ATTACK_DURATION;
    player.attackCooldown = ATTACK_COOLDOWN;
    playChop();

    // Bark ability (from fries) — kills pigeons within 300px
    if (hasFries && friesTimer > 0) {
      playBark();
      barkWaves.push({ x: player.x, y: player.y - 20, radius: 10, life: 0.5, maxLife: 0.5 });
      for (const e of enemies) {
        if (e.type === 'pigeon' && e.alive) {
          const dist = Math.abs(e.x - player.x);
          if (dist < 300) {
            // Kill pigeon
            e.alive = false;
            score += 15;
            pigeonsKilled++;
            addFloatingText(e.x, e.y - 30, '+15 BARK!', '#ffa500');
            spawnParticles(e.x, e.y, '#888888', 8, 100, 100);
            // Trigger chicken spawn every 5 pigeon kills
            if (pigeonsKilled % 5 === 0 && !chicken) {
              chicken = {
                x: player.x + rand(-200, 200),
                y: -50,
                vx: 0, vy: 0,
                grounded: false,
                runDir: Math.random() > 0.5 ? 1 : -1,
                anim: 0,
                caught: false
              };
              addFloatingText(player.x, player.y - 80, 'CHICKEN INCOMING!', '#FFD700');
            }
          }
        }
      }
    }
  }

  // Apply gravity (reduced when flying)
  if (!player.grounded) {
    const gravMult = (canFly && flyTimer > 0) ? 0.15 : 1;
    player.vy += GRAVITY * gravMult * dt;
  }

  // Move player
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Clamp to world
  player.x = clamp(player.x, 20, WORLD_W - 20);

  // Ground collision
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.grounded = true;
    player.jumping = false;
  }

  // Platform collision
  player.grounded = player.y >= GROUND_Y;
  for (const p of platforms) {
    if (player.vy > 0 &&
        player.x > p.x - 10 && player.x < p.x + p.w + 10 &&
        player.y >= p.y && player.y - player.vy * dt < p.y + 5) {
      player.y = p.y;
      player.vy = 0;
      player.grounded = true;
      player.jumping = false;
    }
  }

  // Update animation
  player.anim += dt;
  player.hairPhase += dt * 2;

  // Attack timer
  if (player.attacking) {
    player.attackTimer -= dt;
    if (player.attackTimer <= 0) {
      player.attacking = false;
    }
  }
  if (player.attackCooldown > 0) player.attackCooldown -= dt;

  // Invincibility timer
  if (invincibleTimer > 0) invincibleTimer -= dt;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Screen shake
  if (screenShake > 0) screenShake -= dt;

  // Camera
  const targetCamX = player.x - GAME_W * 0.35;
  camera.x = lerp(camera.x, clamp(targetCamX, 0, WORLD_W - GAME_W), camera.smoothing);

  // Collectible pickup
  for (const c of collectibles) {
    if (c.collected) continue;
    const dx = player.x - c.x;
    const dy = (player.y - 28) - c.y;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
      c.collected = true;
      const points = c.type === 'watermelon' ? 50 : 30;
      const mult = Math.max(1, comboCount);
      score += points * mult;
      comboCount++;
      comboTimer = 2.0;
      playCollect();
      spawnParticles(c.x, c.y, c.type === 'watermelon' ? '#4CAF50' : '#42A5F5', 8, 100, 120);
      addFloatingText(c.x, c.y, `+${points * mult}`, c.type === 'watermelon' ? '#4CAF50' : '#42A5F5');

      // Power-up tracking
      if (c.type === 'watermelon') {
        watermelonsEaten++;
        if (watermelonsEaten % 5 === 0) {
          jumpBoostLevel++;
          playPowerUp();
          addFloatingText(c.x, c.y - 30, 'JUMP BOOST!', '#FFD700');
          spawnParticles(player.x, player.y - 30, '#FFD700', 15, 200, 200);
        }
      } else {
        // Minnow: refill stamina + alternating speed/size boost
        minnowsEaten++;
        stamina = Math.min(STAMINA_MAX, stamina + 30); // each minnow refills 30% stamina
        if (minnowsEaten % 5 === 0) {
          // Alternate: odd batches = speed, even batches = size
          if ((minnowsEaten / 5) % 2 === 1) {
            speedBoostLevel++;
            playPowerUp();
            addFloatingText(c.x, c.y - 30, 'SPEED UP!', '#42A5F5');
          } else {
            sizeBoostLevel++;
            playPowerUp();
            addFloatingText(c.x, c.y - 30, 'SIZE UP!', '#9C27B0');
          }
          spawnParticles(player.x, player.y - 30, '#42A5F5', 15, 200, 200);
        }
      }
    }
  }

  // Enemy AI & collision
  for (const e of enemies) {
    if (!e.alive) {
      if (e.falling) {
        e.vy += GRAVITY * dt * 0.5;
        e.y += e.vy * dt;
      }
      continue;
    }

    // Frozen state — skip patrol, count down timer
    if (e.frozen) {
      e.frozenTimer -= dt;
      if (e.frozenTimer <= 0) {
        e.frozen = false;
        e.frozenTimer = 0;
      }
      e.anim += dt;
      if (e.flash > 0) e.flash -= dt;
      continue;
    }

    // Patrol
    if (e.type === 'cat') {
      e.x += e.patrolDir * 54 * difficulty * dt; // 10% slower (was 60)
      if (Math.abs(e.x - e.patrolOrigin) > e.patrolRange) {
        e.patrolDir *= -1;
      }
    } else {
      // Pigeon flies in a pattern
      e.x += e.patrolDir * 72 * difficulty * dt; // 10% slower (was 80)
      e.y += Math.sin(gameTime * 2 + e.anim) * 30 * dt;
      if (Math.abs(e.x - e.patrolOrigin) > e.patrolRange) {
        e.patrolDir *= -1;
      }
    }

    e.anim += dt;
    if (e.flash > 0) e.flash -= dt;

    // Attack check (chop or kick in kick mode)
    if (player.attacking && player.attackTimer > 0) {
      const effectiveRange = kickModeTimer > 0 ? ATTACK_RANGE * 1.3 : ATTACK_RANGE;
      const attackX = player.x + player.facing * effectiveRange;
      const dx = e.x - attackX;
      const dy = (e.type === 'cat' ? e.y - 20 : e.y) - (player.y - 28);
      const hitRange = kickModeTimer > 0 ? 50 : 40;
      if (Math.abs(dx) < hitRange && Math.abs(dy) < 50) {
        e.alive = false;
        e.vy = -200;
        e.falling = true;
        const pts = e.type === 'cat' ? 100 : 75;
        const bonusMult = kickModeTimer > 0 ? 2 : 1;
        const mult = Math.max(1, comboCount) * bonusMult;
        score += pts * mult;
        comboCount++;
        comboTimer = 2.0;
        screenShake = 0.15;
        spawnParticles(e.x, e.y - 15, '#FFEB3B', 12, 150, 180);
        addFloatingText(e.x, e.y - 30, `+${pts * mult}`, '#FFD700');
        addFloatingText(e.x, e.y - 50, kickModeTimer > 0 ? 'KICK!' : 'CHOP!', '#FF5722');

        // Track kills for power-ups
        if (e.type === 'cat') {
          catsKilled++;
          if (catsKilled % 5 === 0) {
            kickModeTimer = KICK_MODE_DURATION;
            playKickMode();
            addFloatingText(player.x, player.y - 70, 'KICK MODE!', '#FF5722');
            spawnParticles(player.x, player.y - 30, '#FF5722', 20, 200, 200);
          }
        } else {
          pigeonsKilled++;
          if (pigeonsKilled % 5 === 0 && !chicken) {
            // Spawn a chicken falling from the sky
            chicken = {
              x: player.x + rand(-200, 200),
              y: -50, // starts above screen
              vx: 0, vy: 0,
              grounded: false,
              runDir: Math.random() > 0.5 ? 1 : -1,
              anim: 0,
              caught: false
            };
            playChickenSpawn();
            addFloatingText(player.x, player.y - 70, 'CHICKEN INCOMING!', '#FFA000');
          }
        }
      }
    }

    // Player damage
    if (invincibleTimer <= 0 && e.alive && fartModeTimer <= 0) {
      const dx = player.x - e.x;
      const dy = (player.y - 20) - (e.type === 'cat' ? e.y - 15 : e.y);
      if (Math.abs(dx) < 28 && Math.abs(dy) < 30) {
        lives--;
        invincibleTimer = 1.5;
        screenShake = 0.3;
        player.vy = -300;
        player.vx = -player.facing * 200;
        player.grounded = false;
        playHit();
        spawnParticles(player.x, player.y - 20, '#FF5252', 10, 120, 150);

        // Power loss on damage — drain stamina, only lose boosts on repeated hits at low stamina
        stamina = Math.max(0, stamina - 25);
        if (stamina <= 0) {
          // Only lose a boost level when stamina is depleted
          if (jumpBoostLevel > 0) { jumpBoostLevel--; addFloatingText(player.x, player.y - 50, 'JUMP -1', '#FF5252'); }
          else if (speedBoostLevel > 0) { speedBoostLevel--; addFloatingText(player.x, player.y - 50, 'SPEED -1', '#FF5252'); }
          else if (sizeBoostLevel > 0) { sizeBoostLevel--; addFloatingText(player.x, player.y - 50, 'SIZE -1', '#FF5252'); }
        }
        // Shorten kick mode if hit
        if (kickModeTimer > 0) {
          kickModeTimer = Math.max(0, kickModeTimer - 2);
        }

        if (lives <= 0) {
          gameState = STATE.GAMEOVER;
          if (score > hiScore) hiScore = score;
          playGameOver();
        }
      }
    }
  }

  // Update particles
  for (const p of particles) {
    if (p.active) p.update(dt);
  }
  particles = particles.filter(p => p.active);

  // Update floating texts
  for (const ft of floatingTexts) {
    ft.y += ft.vy * dt;
    ft.life -= dt;
  }
  floatingTexts = floatingTexts.filter(f => f.life > 0);

  // ─── KICK MODE TIMER ───
  if (kickModeTimer > 0) {
    kickModeTimer -= dt;
    if (kickModeTimer <= 0) {
      kickModeTimer = 0;
      addFloatingText(player.x, player.y - 60, 'KICK MODE OFF', '#999');
    }
  }

  // ─── CHICKEN LOGIC ───
  if (chicken && !chicken.caught) {
    chicken.anim += dt;
    // Gravity until grounded
    if (!chicken.grounded) {
      chicken.vy += GRAVITY * dt;
      chicken.y += chicken.vy * dt;
      if (chicken.y >= GROUND_Y) {
        chicken.y = GROUND_Y;
        chicken.vy = 0;
        chicken.grounded = true;
      }
    } else {
      // Run around erratically
      chicken.x += chicken.runDir * 180 * dt;
      // Change direction randomly
      if (Math.random() < 0.02) chicken.runDir *= -1;
      // Clamp to world
      if (chicken.x < 50 || chicken.x > WORLD_W - 50) chicken.runDir *= -1;
    }

    // Player catches chicken
    const cdx = player.x - chicken.x;
    const cdy = (player.y - 20) - (chicken.y - 15);
    if (Math.abs(cdx) < 35 && Math.abs(cdy) < 35) {
      chicken.caught = true;
      chicken = null;
      // Activate fart mode!
      fartModeTimer = FART_MODE_DURATION;
      playFart();
      addFloatingText(player.x, player.y - 70, 'FART NUKE!', '#7CB342');
      screenShake = 0.5;
      // Kill all on-screen enemies
      for (const e of enemies) {
        if (!e.alive) continue;
        const esx = e.x - camera.x;
        if (esx > -50 && esx < GAME_W + 50) {
          e.alive = false;
          e.vy = -300;
          e.falling = true;
          score += 200;
          spawnParticles(e.x, e.y - 15, '#7CB342', 10, 150, 180);
        }
      }
    }
  }

  // ─── FART MODE ───
  if (fartModeTimer > 0) {
    fartModeTimer -= dt;
    // Spawn fart cloud particles around player
    if (Math.random() < 0.4) {
      fartClouds.push({
        x: player.x + rand(-30, 30),
        y: player.y - rand(10, 40),
        vx: rand(-40, 40),
        vy: rand(-60, -20),
        size: rand(8, 20),
        life: rand(0.5, 1.2),
        maxLife: 1.2
      });
    }
    // Fart kills any enemy that comes close
    for (const e of enemies) {
      if (!e.alive) continue;
      const fdx = player.x - e.x;
      const fdy = (player.y - 20) - (e.type === 'cat' ? e.y - 15 : e.y);
      if (Math.abs(fdx) < 100 && Math.abs(fdy) < 80) {
        e.alive = false;
        e.vy = -200;
        e.falling = true;
        score += 100;
        spawnParticles(e.x, e.y - 15, '#7CB342', 8, 100, 120);
      }
    }
    if (fartModeTimer <= 0) {
      fartModeTimer = 0;
      fartClouds = [];
      addFloatingText(player.x, player.y - 60, 'FARTS GONE', '#999');
    }
  }

  // Update fart clouds
  for (const fc of fartClouds) {
    fc.x += fc.vx * dt;
    fc.y += fc.vy * dt;
    fc.life -= dt;
  }
  fartClouds = fartClouds.filter(fc => fc.life > 0);

  // ─── DOG BED NAP CHECK ───
  // If player is standing on a dog bed and presses down, start napping
  const napKey = keys['ArrowDown'] || keys['KeyS'] || touchAction.down;
  if (napKey && player.grounded && !isNapping && stamina < STAMINA_MAX) {
    for (const bed of dogBeds) {
      if (player.x > bed.x - 5 && player.x < bed.x + bed.w + 5 &&
          Math.abs(player.y - bed.y) < 5) {
        isNapping = true;
        napTimer = 0;
        napBubble = 0;
        playNap();
        addFloatingText(player.x, player.y - 50, 'ZZZ...', '#9C27B0');
        break;
      }
    }
  }

  // Pee ability (from burgers) — down key while grounded & not napping
  const peeJustPressed = justPressed['ArrowDown'] || justPressed['KeyS'] || touchDownJustPressed;
  if (hasBurger && (napKey || peeJustPressed) && player.grounded && !isNapping) {
    // Only spawn puddle if not already very close to one
    let canPee = true;
    for (const p of peePuddles) {
      if (Math.abs(p.x - player.x) < 40) { canPee = false; break; }
    }
    if (canPee) {
      playPee();
      peePuddles.push({ x: player.x, y: GROUND_Y, radius: 18, life: 8, maxLife: 8 });
      addFloatingText(player.x, player.y - 40, 'PEE!', '#e8d44d');
    }
  }

  // ─── UPDATE FOXES, RACCOONS & MORTY ───
  updateFoxes(dt);
  updateRaccoons(dt);
  updateMorty(dt);

  // ─── JESSICA WIN CHECK ───
  if (!jessica.reached && player.x >= jessica.x - 80) {
    // Player reached Jessica! Trigger win sequence
    gameState = STATE.WIN;
    winAnimPhase = 0;
    winAnimTimer = 0;
    winHearts = [];
    // Stop music fade
    // Keep score as final
    if (score > hiScore) hiScore = score;
  }

  // ─── TRASH FOOD PICKUP → FLIGHT POWER ───
  trashCans.forEach(tc => {
    if (tc.knocked && tc.spilledFood && !tc.foodEaten) {
      const dx = Math.abs(player.x - tc.foodX);
      const dy = Math.abs(player.y - tc.foodY);
      if (dx < 30 && dy < 40) {
        tc.foodEaten = true;
        canFly = true;
        flyTimer = FLY_DURATION;
        addFloatingText(player.x, player.y - 50, 'FLIGHT POWER!', '#FFD700');
        spawnParticles(player.x, player.y - 20, '#FFD700', 12, 150, 150);
      }
    }
  });

  // ─── FLIGHT CONTROLS ───
  if (canFly && flyTimer > 0) {
    flyTimer -= dt;
    // Hold jump to go up while flying
    if (keys.ArrowUp || keys[' '] || keys.w || keys.W) {
      player.vy = -200;
      player.grounded = false;
    }
    if (flyTimer <= 0) {
      flyTimer = 0;
      canFly = false;
    }
  }

  // ─── STAMINA DRAIN ───
  // Stamina slowly drains when running or attacking (not while idle/napping)
  if (player.running || player.attacking) {
    stamina = Math.max(0, stamina - 1.5 * dt);
  }
  // Low stamina reduces speed
  if (stamina <= 0) {
    player.vx *= 0.8;
  }

  // ─── POWER-UP TIMER COUNTDOWNS ───
  if (friesTimer > 0) {
    friesTimer -= dt;
    if (friesTimer <= 0) { friesTimer = 0; hasFries = false; }
  }
  // Burger/pee is now permanent once purchased
  // (burgerTimer kept for HUD display but no longer expires)
  if (shakeSpeedTimer > 0) {
    shakeSpeedTimer -= dt;
    if (shakeSpeedTimer <= 0) shakeSpeedTimer = 0;
  }

  // ─── PEE PUDDLE UPDATES ───
  for (let i = peePuddles.length - 1; i >= 0; i--) {
    peePuddles[i].life -= dt;
    if (peePuddles[i].life <= 0) {
      peePuddles.splice(i, 1);
      continue;
    }
    // Freeze cats that walk over puddles
    const puddle = peePuddles[i];
    for (const e of enemies) {
      if (e.type === 'cat' && e.alive && !e.frozen && Math.abs(e.x - puddle.x) < puddle.radius + 15) {
        e.frozen = true;
        e.frozenTimer = 5;
        score += 150;
        addFloatingText(e.x, e.y - 30, '+150 FROZEN!', '#87CEEB');
        spawnParticles(e.x, e.y, '#87CEEB', 8, 80, 80);
      }
    }
  }

  // ─── BARK WAVE UPDATES ───
  for (let i = barkWaves.length - 1; i >= 0; i--) {
    barkWaves[i].life -= dt;
    barkWaves[i].radius += 400 * dt; // expand outward
    if (barkWaves[i].life <= 0) {
      barkWaves.splice(i, 1);
    }
  }

  // Update music tempo based on power level
  updateMusic();
}

// ─── RENDER ───
function render(time) {
  ctx.save();

  // Apply letterboxing scale
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // Screen shake
  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake * 30,
      (Math.random() - 0.5) * screenShake * 20
    );
  }

  // Clip to game area
  ctx.beginPath();
  ctx.rect(0, 0, GAME_W, GAME_H);
  ctx.clip();

  if (gameState === STATE.MENU) {
    drawMenu(time);
  } else if (gameState === STATE.PLAYING || gameState === STATE.GAMEOVER || gameState === STATE.WIN) {
    const camX = camera.x;

    // Sky
    drawSky();

    // Parallax layers
    drawMountains(camX);
    drawTreeLine(camX);

    // Buildings (behind player)
    for (const b of buildings) {
      b.draw(ctx, camX);
    }

    // Gazebo
    drawGazebo(camX);

    // Burger Shop
    drawBurgerShop(camX, time);

    // Street lamps
    drawStreetLamps(camX);

    // Street trees
    drawStreetTrees(camX);

    // Ground
    drawGround(camX);

    // Platforms
    for (const p of platforms) {
      drawPlatform(p, camX);
    }

    // Dog beds on platforms
    for (const bed of dogBeds) {
      drawDogBed(bed, camX, time);
    }

    // Collectibles
    for (const c of collectibles) {
      if (c.collected) continue;
      const sx = c.x - camX;
      if (sx < -30 || sx > GAME_W + 30) continue;
      if (c.type === 'watermelon') {
        drawWatermelon(c.x, c.y, camX, time, c.bobPhase);
      } else {
        drawMinnow(c.x, c.y, camX, time, c.bobPhase);
      }
    }

    // Trash cans
    for (const tc of trashCans) {
      drawTrashCan(tc, camX);
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive && e.y > GAME_H + 50) continue;
      if (e.type === 'cat') drawCat(e, camX, time);
      else drawPigeon(e, camX, time);

      // Frozen effect overlay on cats
      if (e.type === 'cat' && e.frozen && e.alive) {
        const esx = e.x - camX;
        if (esx > -60 && esx < GAME_W + 60) {
          // Blue ice overlay
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#87CEEB';
          ctx.fillRect(esx - 18, e.y - 32, 36, 32);
          ctx.globalAlpha = 1;
          // Ice sparkle border
          ctx.strokeStyle = '#ADD8E6';
          ctx.lineWidth = 2;
          ctx.strokeRect(esx - 18, e.y - 32, 36, 32);
          // Snowflake emoji
          ctx.font = '14px serif';
          ctx.fillStyle = '#FFF';
          ctx.textAlign = 'center';
          ctx.fillText('❄', esx, e.y - 36);
          ctx.textAlign = 'left';
        }
      }
    }

    // Foxes
    for (const f of foxes) {
      drawFox(f, camX, time);
    }

    // Raccoons
    for (const r of raccoons) {
      drawRaccoon(r, camX, time);
    }

    // Morty cameo
    drawMorty(camX, time);

    // Jessica (win condition at end of world)
    drawJessica(camX, time);

    // Chicken
    drawChicken(camX, time);

    // Player
    drawPlayer(camX, time);

    // Win hearts
    for (const h of winHearts) {
      const hx = h.x - camX;
      ctx.globalAlpha = Math.max(0, h.life / 2);
      ctx.fillStyle = '#FF6B9D';
      ctx.font = `${Math.round(h.size)}px serif`;
      ctx.textAlign = 'center';
      ctx.fillText('♥', hx, h.y);
      ctx.globalAlpha = 1;
    }
    ctx.textAlign = 'left';

    // Pee puddles
    for (const puddle of peePuddles) {
      const px = puddle.x - camX;
      if (px < -40 || px > GAME_W + 40) continue;
      ctx.globalAlpha = 0.7 * (puddle.life / puddle.maxLife);
      ctx.fillStyle = '#e8d44d';
      ctx.beginPath();
      ctx.ellipse(px, puddle.y, puddle.radius, puddle.radius * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Bark waves
    for (const wave of barkWaves) {
      ctx.globalAlpha = 0.5 * (wave.life / wave.maxLife);
      ctx.strokeStyle = '#ffa500';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(wave.x - camX, wave.y, wave.radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Fart clouds
    drawFartClouds(camX);

    // Particles
    for (const p of particles) {
      if (p.active) p.draw(ctx, camX);
    }

    // Floating texts
    for (const ft of floatingTexts) {
      ctx.globalAlpha = ft.life;
      ctx.font = 'bold 18px Bangers, cursive';
      ctx.fillStyle = ft.color;
      ctx.textAlign = 'center';
      ctx.fillText(ft.text, ft.x - camX, ft.y);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }

    // HUD
    drawHUD();

    if (gameState === STATE.GAMEOVER) {
      drawGameOver(time);
    }
    if (gameState === STATE.WIN && winAnimPhase === 2 && winAnimTimer > 2) {
      drawWinScreen(time);
    }
  } else if (gameState === STATE.SHOP) {
    drawShopInterior(time);
  } else if (gameState === STATE.INITIALS) {
    drawInitialsScreen(time);
  }

  ctx.restore();

  // Black bars for letterboxing
  if (offsetX > 0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, offsetX, H);
    ctx.fillRect(W - offsetX, 0, offsetX, H);
  }
  if (offsetY > 0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, offsetY);
    ctx.fillRect(0, H - offsetY, W, offsetY);
  }
}

// ─── GAME LOOP ───
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Handle deferred start/restart (from touch on canvas)
  if (startGameRequested) {
    startGameRequested = false;
    if (gameState === STATE.MENU) {
      startGame();
    } else if (gameState === STATE.GAMEOVER) {
      if (score > 0 && isHighScore(score)) {
        enterInitials();
      } else {
        startGame();
      }
    } else if (gameState === STATE.WIN && winAnimPhase === 2 && winAnimTimer > 3) {
      if (score > 0 && isHighScore(score)) {
        enterInitials();
      } else {
        startGame();
      }
    }
  }

  if (gameState === STATE.PLAYING) {
    updateGame(dt);
  }
  if (gameState === STATE.WIN) {
    updateWinAnimation(dt);
  }
  if (gameState === STATE.SHOP) {
    updateShop();
  }
  if (gameState === STATE.INITIALS) {
    handleInitialsInput();
  }

  render(timestamp / 1000);
  clearJustPressed();
  requestAnimationFrame(gameLoop);
}

// ─── START / RESTART ───
function startGame() {
  score = 0;
  lives = 3;
  comboCount = 0;
  comboTimer = 0;
  invincibleTimer = 0;
  screenShake = 0;
  gameTime = 0;
  difficulty = 1;
  // Reset power-up state
  stamina = STAMINA_MAX;
  watermelonsEaten = 0;
  jumpBoostLevel = 0;
  minnowsEaten = 0;
  speedBoostLevel = 0;
  sizeBoostLevel = 0;
  catsKilled = 0;
  kickModeTimer = 0;
  pigeonsKilled = 0;
  chicken = null;
  fartModeTimer = 0;
  fartClouds = [];
  isNapping = false;
  napTimer = 0;
  napBubble = 0;
  // Reset & start music (play() here so it runs within user gesture on Chrome mobile)
  bgMusic.currentTime = 0;
  musicPlaying = false;
  // Reset burger shop state
  minnowsSpent = 0;
  hasFries = false;
  friesTimer = 0;
  hasBurger = false;
  burgerTimer = 0;
  shakeSpeedTimer = 0;
  shopCursor = 0;
  peePuddles = [];
  barkWaves = [];
  // Reset new entities and flight
  foxes = [];
  raccoons = [];
  trashCans = [];
  canFly = false;
  flyTimer = 0;
  // Reset Morty cameo
  morty = null;
  mortyTriggered = false;
  mortySparkles = [];
  // Reset Jessica / win state
  jessica = { x: JESSICA_X, y: GROUND_Y, reached: false };
  winAnimTimer = 0;
  winAnimPhase = 0;
  winHearts = [];
  // Hide exit shop button
  var exitBtn = document.getElementById('exit-shop-btn');
  if (exitBtn) exitBtn.style.display = 'none';
  // Reset player
  player.x = 200;
  player.y = GROUND_Y;
  player.vx = 0;
  player.vy = 0;
  player.grounded = true;
  player.attacking = false;
  player.attackTimer = 0;
  player.attackCooldown = 0;
  camera.x = 0;
  generateWorld();
  gameState = STATE.PLAYING;
  // Start music immediately — must happen inside user gesture for Chrome mobile
  updateMusic();
}

// ─── INPUT HANDLERS ───
function handleStart() {
  grabFocus();
  initAudio();
  if (gameState === STATE.MENU) {
    startGame();
  } else if (gameState === STATE.GAMEOVER) {
    if (score > 0 && isHighScore(score)) {
      enterInitials();
    } else {
      startGame();
    }
  } else if (gameState === STATE.WIN && winAnimPhase === 2 && winAnimTimer > 3) {
    if (score > 0 && isHighScore(score)) {
      enterInitials();
    } else {
      startGame();
    }
  }
}

// Listen for start on canvas, document, AND window for iframe compat
function onStartKey(e) {
  if (gameState !== STATE.PLAYING && gameState !== STATE.SHOP && gameState !== STATE.INITIALS && (e.code === 'Space' || e.code === 'Enter')) {
    e.preventDefault();
    handleStart();
  }
}
canvas.addEventListener('keydown', onStartKey);
document.addEventListener('keydown', onStartKey);

canvas.addEventListener('click', (e) => {
  if (gameState === STATE.INITIALS) {
    // Handle click for initials entry screen (desktop)
    const rect = canvas.getBoundingClientRect();
    const rawX = e.clientX - rect.left;
    const rawY = e.clientY - rect.top;
    const gameX = (rawX - offsetX) / scale;
    const gameY = (rawY - offsetY) / scale;
    handleInitialsTouch(gameX, gameY);
    return;
  }
  handleStart();
});

// Audio init is handled in the canvas touchstart handler above

// ─── DETERMINISTIC HOOKS FOR TESTING ───
// Debug helper for testing
window.setKickMode = function(seconds) { kickModeTimer = seconds || 30; };
window.setInvincible = function(seconds) { invincibleTimer = seconds || 999; lives = 3; };
window.getBgMusic = function() { return { paused: bgMusic.paused, currentTime: bgMusic.currentTime, duration: bgMusic.duration, readyState: bgMusic.readyState, src: bgMusic.src }; };
window.setFartMode = function(seconds) { fartModeTimer = seconds || 30; };
window.setFlyMode = function(seconds) { canFly = true; flyTimer = seconds || 30; };
window.teleportPlayer = function(x) { player.x = x; player.vx = 0; };
window.giveMinnows = function(n) { minnowsEaten += (n || 50); };
window.giveBurger = function() { hasBurger = true; burgerTimer = BURGER_DURATION; };
window.getFoxes = function() { return foxes.map(f => ({ x: Math.round(f.x), facing: f.facing, state: f.state })); };
window.getMorty = function() { return morty ? { x: Math.round(morty.x), state: morty.state, facing: morty.facing, triggered: mortyTriggered } : { triggered: mortyTriggered }; };
window.spawnMorty = function() { mortyTriggered = false; morty = null; player.x = MORTY_SPAWN_X - 50; };
window.getJessica = function() { return { x: jessica.x, reached: jessica.reached, winPhase: winAnimPhase, winTimer: winAnimTimer }; };
window.goToJessica = function() { player.x = jessica.x - 200; invincibleTimer = 999; };
window.render_game_to_text = function() {
  return JSON.stringify({
    state: ['MENU', 'PLAYING', 'GAMEOVER', 'PAUSED', 'SHOP', 'WIN', 'INITIALS'][gameState],
    player: { x: Math.round(player.x), y: Math.round(player.y), vx: Math.round(player.vx), vy: Math.round(player.vy), grounded: player.grounded, attacking: player.attacking },
    camera: { x: Math.round(camera.x) },
    score, lives, comboCount,
    enemiesAlive: enemies.filter(e => e.alive).length,
    collectiblesLeft: collectibles.filter(c => !c.collected).length,
    difficulty: Math.round(difficulty * 10) / 10,
    powerups: {
      stamina: Math.round(stamina),
      jumpBoost: jumpBoostLevel,
      speedBoost: speedBoostLevel,
      sizeBoost: sizeBoostLevel,
      watermelonsEaten, minnowsEaten, catsKilled, pigeonsKilled,
      kickMode: kickModeTimer > 0,
      kickTimer: Math.round(kickModeTimer * 10) / 10,
      fartMode: fartModeTimer > 0,
      fartTimer: Math.round(fartModeTimer * 10) / 10,
      chickenActive: !!chicken,
      isNapping,
      dogBeds: dogBeds.length,
      hasFries, friesTimer: Math.round(friesTimer * 10) / 10,
      hasBurger, burgerTimer: Math.round(burgerTimer * 10) / 10,
      shakeSpeed: shakeSpeedTimer > 0,
      shakeTimer: Math.round(shakeSpeedTimer * 10) / 10,
      availableMinnows: minnowsEaten - minnowsSpent,
      peePuddles: peePuddles.length
    }
  });
};


window.advanceTime = function(ms) {
  const steps = Math.max(1, Math.round(ms / (1000 / 60)));
  for (let i = 0; i < steps; i++) {
    if (gameState === STATE.PLAYING) updateGame(1 / 60);
    if (gameState === STATE.WIN) updateWinAnimation(1 / 60);
  }
  render(performance.now() / 1000);
};

// ─── INIT ───
requestAnimationFrame(gameLoop);

})();

</script>
