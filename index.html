<script>
// ============================================================
// MR PEABODY'S HEALDSBURG CRUSADE
// A side-scrolling action game featuring a Chinese Crested dog
// collecting watermelons & minnows, karate chopping cats & pigeons
// Set in downtown Healdsburg, CA
// ============================================================

(function() {
'use strict';

// ─── CANVAS SETUP ───
const canvas = document.getElementById('gameCanvas');
canvas.setAttribute('tabindex', '0');
canvas.style.outline = 'none';  // hide focus ring
const ctx = canvas.getContext('2d');
let W, H;
const GAME_W = 1280;
const GAME_H = 720;
let scale = 1;
let offsetX = 0, offsetY = 0;
let hasUserInteracted = false;  // track if user has clicked/tapped to enable keyboard

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  scale = Math.min(W / GAME_W, H / GAME_H);
  offsetX = (W - GAME_W * scale) / 2;
  offsetY = (H - GAME_H * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

// ─── INPUT STATE (declared early so keyboard trap can reference them) ───
const keys = {};
const justPressed = {};

// ─── IFRAME KEYBOARD FOCUS FIX ───
// Strategy: use a hidden <input> as a keyboard trap. In cross-origin iframes,
// <input> elements reliably capture keyboard focus (browsers allow this for
// accessibility). We also bind keydown/keyup to document and window as fallbacks.
// Additionally, we forward any key events from the hidden input to our handler.
const kbTrap = document.getElementById('kb-trap');

const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
function grabFocus() {
  hasUserInteracted = true;
  // Try multiple focus targets — one of them will work in the iframe sandbox
  try { canvas.focus({ preventScroll: true }); } catch(e) {}
  // Only focus the keyboard trap on non-touch devices (iPad with keyboard, laptops)
  // On phones, this would open the virtual keyboard and block the game
  if (!isTouchDevice || (window.innerWidth > 800)) {
    try { if (kbTrap) kbTrap.focus({ preventScroll: true }); } catch(e) {}
  }
  try { window.focus(); } catch(e) {}
}

// Grab focus on any user interaction anywhere in the page
['click', 'touchstart', 'mousedown', 'pointerdown'].forEach(evt => {
  document.addEventListener(evt, grabFocus, true);
});

// Also listen for focus/blur on the window to re-grab focus
window.addEventListener('focus', grabFocus);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) grabFocus();
});

// Bind keyboard events to the hidden input too
if (kbTrap) {
  kbTrap.addEventListener('keydown', function(e) {
    // Prevent the input from actually receiving text
    e.preventDefault();
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
      e.preventDefault();
    }
    if (!keys[e.code]) justPressed[e.code] = true;
    keys[e.code] = true;
  });
  kbTrap.addEventListener('keyup', function(e) {
    e.preventDefault();
    keys[e.code] = false;
  });
}

// Auto-focus on load and with delays for slow iframe initialization
grabFocus();
setTimeout(grabFocus, 100);
setTimeout(grabFocus, 300);
setTimeout(grabFocus, 600);
setTimeout(grabFocus, 1000);
// Keep re-focusing periodically for the first few seconds
let focusAttempts = 0;
const focusInterval = setInterval(() => {
  grabFocus();
  focusAttempts++;
  if (focusAttempts > 20) clearInterval(focusInterval);
}, 500);

// Dismiss the click-to-activate overlay on first interaction
const focusOverlay = document.getElementById('focus-overlay');
if (focusOverlay) {
  function dismissOverlay(e) {
    focusOverlay.style.display = 'none';
    grabFocus();
    initAudio();
    focusOverlay.removeEventListener('click', dismissOverlay);
    focusOverlay.removeEventListener('touchstart', dismissOverlay);
    focusOverlay.removeEventListener('pointerdown', dismissOverlay);
  }
  focusOverlay.addEventListener('click', dismissOverlay);
  focusOverlay.addEventListener('touchstart', dismissOverlay, { passive: false });
  focusOverlay.addEventListener('pointerdown', dismissOverlay);
}

// ─── UTILITY ───
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const rand = (lo, hi) => Math.random() * (hi - lo) + lo;
const randInt = (lo, hi) => Math.floor(rand(lo, hi + 1));
const easeOutQuad = t => t * (2 - t);

// ─── AUDIO (procedural SFX) ───
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume();
  unlockMusic(); // warm up bgMusic element in user gesture for Chrome mobile
  updateMusic();
}

function playSFX(freq, dur, type = 'square', vol = 0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playJump() { playSFX(400, 0.15, 'sine', 0.12); setTimeout(() => playSFX(600, 0.1, 'sine', 0.1), 50); }
function playCollect() { playSFX(880, 0.1, 'sine', 0.15); setTimeout(() => playSFX(1100, 0.12, 'sine', 0.12), 60); }
function playChop() { playSFX(200, 0.08, 'sawtooth', 0.2); playSFX(120, 0.12, 'square', 0.15); }
function playHit() { playSFX(100, 0.2, 'sawtooth', 0.2); }
function playGameOver() { playSFX(300, 0.3, 'sine', 0.15); setTimeout(() => playSFX(200, 0.4, 'sine', 0.12), 200); setTimeout(() => playSFX(100, 0.6, 'sine', 0.1), 400); }
function playKickMode() { playSFX(500, 0.1, 'sine', 0.15); setTimeout(() => playSFX(700, 0.1, 'sine', 0.15), 80); setTimeout(() => playSFX(900, 0.15, 'sine', 0.12), 160); }
function playChickenSpawn() { playSFX(600, 0.05, 'square', 0.12); setTimeout(() => playSFX(800, 0.05, 'square', 0.12), 60); setTimeout(() => playSFX(600, 0.05, 'square', 0.12), 120); setTimeout(() => playSFX(900, 0.08, 'square', 0.1), 180); }
function playFart() { playSFX(80, 0.3, 'sawtooth', 0.2); playSFX(60, 0.4, 'square', 0.12); setTimeout(() => playSFX(50, 0.2, 'sawtooth', 0.15), 100); }
function playNap() { playSFX(300, 0.2, 'sine', 0.08); setTimeout(() => playSFX(280, 0.3, 'sine', 0.06), 300); }
function playPowerUp() { playSFX(440, 0.08, 'sine', 0.12); setTimeout(() => playSFX(660, 0.08, 'sine', 0.12), 80); setTimeout(() => playSFX(880, 0.12, 'sine', 0.1), 160); }
function playBark() { playSFX(250, 0.12, 'square', 0.2); setTimeout(() => playSFX(350, 0.08, 'square', 0.18), 60); setTimeout(() => playSFX(200, 0.15, 'sawtooth', 0.15), 120); }
function playPee() { playSFX(600, 0.3, 'sine', 0.08); playSFX(580, 0.35, 'sine', 0.06); }
function playShopBuy() { playSFX(523, 0.08, 'sine', 0.12); setTimeout(() => playSFX(659, 0.08, 'sine', 0.12), 60); setTimeout(() => playSFX(784, 0.12, 'sine', 0.1), 120); }

// ─── MUSIC SYSTEM (MP3 song) ───
let musicPlaying = false;
let musicUnlocked = false; // Chrome mobile needs audio unlocked in user gesture
const bgMusic = new Audio('peabody-crusade.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.35;
bgMusic.preload = 'auto';

// Unlock audio for Chrome mobile: must call play() inside a user gesture
// even if we immediately pause. This "warms up" the element so future
// play() calls from non-gesture contexts (game loop) will work.
function unlockMusic() {
  if (musicUnlocked) return;
  musicUnlocked = true;
  // Start playback muted briefly to unlock, then restore volume
  const origVol = bgMusic.volume;
  bgMusic.volume = 0;
  const p = bgMusic.play();
  if (p && p.then) {
    p.then(() => {
      bgMusic.pause();
      bgMusic.currentTime = 0;
      bgMusic.volume = origVol;
    }).catch(() => {
      bgMusic.volume = origVol;
      musicUnlocked = false; // retry on next gesture
    });
  } else {
    bgMusic.pause();
    bgMusic.currentTime = 0;
    bgMusic.volume = origVol;
  }
}

function updateMusic() {
  if (gameState === STATE.PLAYING || gameState === STATE.SHOP) {
    if (!musicPlaying) {
      bgMusic.play().catch(() => {});
      musicPlaying = true;
    }
  } else {
    if (musicPlaying) {
      bgMusic.pause();
      musicPlaying = false;
    }
  }
}

// ─── PAUSE MUSIC WHEN LEAVING / SWITCHING TABS ───
window.addEventListener('blur', () => {
  if (!bgMusic.paused) { bgMusic.pause(); musicPlaying = false; }
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (!bgMusic.paused) { bgMusic.pause(); musicPlaying = false; }
  } else {
    updateMusic();
  }
});
window.addEventListener('pagehide', () => { bgMusic.pause(); });

// ─── INPUT ───
function onKeyDown(e) {
  // Prevent arrow keys and space from scrolling the page
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
    e.preventDefault();
  }
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
}
function onKeyUp(e) { keys[e.code] = false; }
// Bind to canvas (primary — gets events when canvas has focus),
// document, AND window for maximum compatibility across browsers/iframes
canvas.addEventListener('keydown', onKeyDown);
canvas.addEventListener('keyup', onKeyUp);
document.addEventListener('keydown', onKeyDown);
document.addEventListener('keyup', onKeyUp);
window.addEventListener('keydown', onKeyDown);
window.addEventListener('keyup', onKeyUp);
function clearJustPressed() {
  Object.keys(justPressed).forEach(k => delete justPressed[k]);
  touchJumpJustPressed = false;
  touchAttackJustPressed = false;
  touchDownJustPressed = false;
}

// ─── TOUCH / MOBILE SUPPORT ───
let isMobile = false;
let touchAction = { left: false, right: false, jump: false, attack: false, down: false };
let touchJumpJustPressed = false;
let touchAttackJustPressed = false;
let touchDownJustPressed = false;

function detectMobile() {
  isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0 ||
    window.matchMedia('(hover: none) and (pointer: coarse)').matches;
}
detectMobile();

// Wire up the on-screen button controls
function initTouchControls() {
  const btnLeft = document.getElementById('btn-left');
  const btnDown = document.getElementById('btn-down');
  const btnRight = document.getElementById('btn-right');
  const btnJump = document.getElementById('btn-jump');
  const btnAttack = document.getElementById('btn-attack');

  if (!btnLeft) return; // controls not in DOM

  // Track which touches belong to which buttons
  const activeTouches = new Map(); // touchId -> action

  function actionFromEl(el) {
    if (!el) return null;
    const a = el.dataset ? el.dataset.action : null;
    if (a) return a;
    // Walk up for nested elements
    if (el.parentElement && el.parentElement.dataset) return el.parentElement.dataset.action || null;
    return null;
  }

  function updateState() {
    touchAction.left = false;
    touchAction.right = false;
    touchAction.jump = false;
    touchAction.attack = false;
    touchAction.down = false;
    for (const action of activeTouches.values()) {
      touchAction[action] = true;
    }
  }

  function setPressed(el, on) {
    if (el) { if (on) el.classList.add('pressed'); else el.classList.remove('pressed'); }
  }

  const btnMap = { left: btnLeft, right: btnRight, jump: btnJump, attack: btnAttack, down: btnDown };

  // Shared handler for the entire touch-controls container
  const container = document.getElementById('touch-controls');

  container.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudio(); // unlock audio on any touch control tap (Chrome mobile)
    for (const touch of e.changedTouches) {
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const action = actionFromEl(el);
      if (action) {
        activeTouches.set(touch.identifier, action);
        setPressed(btnMap[action], true);
        if (action === 'jump') touchJumpJustPressed = true;
        if (action === 'attack') touchAttackJustPressed = true;
        if (action === 'down') touchDownJustPressed = true;
      }
    }
    updateState();
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const action = actionFromEl(el);
      const prevAction = activeTouches.get(touch.identifier);
      if (action !== prevAction) {
        // Finger slid to a different button
        if (prevAction) setPressed(btnMap[prevAction], false);
        if (action) {
          activeTouches.set(touch.identifier, action);
          setPressed(btnMap[action], true);
          if (action === 'jump') touchJumpJustPressed = true;
          if (action === 'attack') touchAttackJustPressed = true;
        } else {
          activeTouches.delete(touch.identifier);
        }
      }
    }
    updateState();
  }, { passive: false });

  container.addEventListener('touchend', (e) => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const action = activeTouches.get(touch.identifier);
      if (action) setPressed(btnMap[action], false);
      activeTouches.delete(touch.identifier);
    }
    updateState();
  }, { passive: false });

  container.addEventListener('touchcancel', (e) => {
    for (const touch of e.changedTouches) {
      const action = activeTouches.get(touch.identifier);
      if (action) setPressed(btnMap[action], false);
      activeTouches.delete(touch.identifier);
    }
    updateState();
  }, { passive: false });
}

// Prevent default touch behaviors on the canvas (scroll, zoom, etc.)
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  if (gameState === STATE.INITIALS) {
    // Handle touch for initials entry screen
    const touch = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const rawX = touch.clientX - rect.left;
    const rawY = touch.clientY - rect.top;
    // Convert screen coords to game coords
    const gameX = (rawX - offsetX) / scale;
    const gameY = (rawY - offsetY) / scale;
    handleInitialsTouch(gameX, gameY);
    return;
  }
  // If on menu, start game directly from user gesture
  // so bgMusic.play() is called within the gesture context (Chrome mobile fix)
  if (gameState === STATE.MENU) {
    startGame();
  } else if (gameState === STATE.GAMEOVER) {
    if (score > 0 && isHighScore(score)) {
      enterInitials();
    } else {
      startGame();
    }
  } else if (gameState === STATE.WIN && winAnimPhase === 2 && winAnimTimer > 3) {
    if (score > 0 && isHighScore(score)) {
      enterInitials();
    } else {
      startGame();
    }
  }
}, { passive: false });

const LEADERBOARD_KEY = 'peabody_leaderboard';

// Background mountains/hills
function drawMountains(scrollX) {
  ctx.save();
  const offset = scrollX * 0.05;
  // Distant hills
  ctx.fillStyle = '#7BA27E';
  ctx.beginPath();
  ctx.moveTo(-100, GROUND_Y - 180);
  for (let x = -100; x < GAME_W + 200; x += 40) {
    const baseY = GROUND_Y - 180;
    const h = Math.sin((x + offset) * 0.003) * 60 + Math.sin((x + offset) * 0.007) * 30 + Math.cos((x + offset) * 0.002) * 40;
    ctx.lineTo(x, baseY - h);
  }
  ctx.lineTo(GAME_W + 200, GROUND_Y);
  ctx.lineTo(-100, GROUND_Y);
  ctx.closePath();
  ctx.fill();

  // Vineyard rows on hills
  ctx.strokeStyle = '#6B926E';
  ctx.lineWidth = 1;
  for (let row = 0; row < 5; row++) {
    ctx.beginPath();
    for (let x = -100; x < GAME_W + 200; x += 3) {
      const baseY = GROUND_Y - 140 + row * 20;
      const h = Math.sin((x + offset) * 0.003) * 40 + Math.sin((x + offset) * 0.007) * 20;
      if (x === -100) ctx.moveTo(x, baseY - h);
      else ctx.lineTo(x, baseY - h);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// Mid-distance trees
function drawTreeLine(scrollX) {
  ctx.save();
  const offset = scrollX * 0.15;
  const treePositions = [];
  for (let i = 0; i < 30; i++) {
    treePositions.push({
      x: i * 90 + Math.sin(i * 2.3) * 30,
      h: 60 + Math.sin(i * 1.7) * 25,
      w: 35 + Math.sin(i * 3.1) * 10
    });
  }
  for (const tree of treePositions) {
    const screenX = ((tree.x - offset) % (30 * 90) + 30 * 90) % (30 * 90) - 100;
    if (screenX < -60 || screenX > GAME_W + 60) continue;
    // Trunk
    ctx.fillStyle = '#5D4037';
    ctx.fillRect(screenX - 4, GROUND_Y - 100 - tree.h * 0.3, 8, tree.h * 0.5);
    // Canopy
    ctx.fillStyle = '#4A7C4F';
    ctx.beginPath();
    ctx.ellipse(screenX, GROUND_Y - 100 - tree.h * 0.5, tree.w, tree.h * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3D6B42';
    ctx.beginPath();
    ctx.ellipse(screenX - 8, GROUND_Y - 100 - tree.h * 0.6, tree.w * 0.7, tree.h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

class Building {
  constructor(x, type) {
    this.x = x;
    this.type = type;
    this.w = 120 + randInt(0, 80);
    this.floors = randInt(1, 3);
    this.h = this.floors * 80 + 40;
    this.color = this.pickColor();
    this.trimColor = this.pickTrimColor();
    this.roofStyle = randInt(0, 2); // 0=flat, 1=peaked, 2=awning
    this.windows = [];
    this.signText = this.pickSign();
    this.hasAwning = Math.random() > 0.3;
    this.awningColor = `hsl(${randInt(0, 360)}, ${randInt(20, 50)}%, ${randInt(40, 60)}%)`;
    this.doorX = this.w * (0.3 + Math.random() * 0.4);
    this.generateWindows();
    this.applyShopStyle();
  }

  pickColor() {
    const colors = [
      '#E8DCC8', '#F5EDE0', '#D4C5A9', '#C9B99A',
      '#E2D5C0', '#F0E6D3', '#D9CDB8', '#BFB398',
      '#E5D8C4', '#FAEBD7', '#DDD0BC', '#C8BA9F',
      '#F2E8D5', '#E0D4BF', '#CBB99C', '#D6C8AE',
      '#FFF8EF', '#F5ECDC', '#EAE0CF', '#D8CCBA'
    ];
    return colors[randInt(0, colors.length - 1)];
  }

  pickTrimColor() {
    const colors = ['#5D4037', '#3E2723', '#4E342E', '#6D4C41', '#795548', '#4A332A', '#2C1810'];
    return colors[randInt(0, colors.length - 1)];
  }

  pickSign() {
    const signs = [
      'Costeaux Bakery', 'Oakville Grocery', 'SingleThread',
      'Dry Creek Kitchen', 'Barndiva', 'Noble Folk',
      'Flying Goat Coffee', 'Journeyman Meats', 'Plaza Gourmet',
      "Mr. Moon's", 'Fideaux Pets', 'Running Company',
      'The Matheson', 'Baci Cafe', 'Little Saint',
      'Lime Stone', 'Punch', 'Gallery Lulo',
      'Hotel Healdsburg', 'Spoke Folk Cyclery', 'Maison Fiori',
      'Shed', 'Campo Fina', "Willi's Seafood", 'Bravas Tapas'
    ];
    return signs[randInt(0, signs.length - 1)];
  }

  applyShopStyle() {
    const styles = {
      'Costeaux Bakery': { color: '#F5EDE0', trim: '#8B6914', awning: '#C4A35A' },
      'Oakville Grocery': { color: '#2E4A2E', trim: '#FFF8EF', awning: '#3D6B42' },
      'SingleThread': { color: '#1C1C1C', trim: '#888', awning: '#333' },
      'Dry Creek Kitchen': { color: '#D2B48C', trim: '#5D4037', awning: '#8B6914' },
      'Barndiva': { color: '#8B2500', trim: '#FFD700', awning: '#A0522D' },
      'Noble Folk': { color: '#FFE4E1', trim: '#FF69B4', awning: '#FFB6C1' },
      'Flying Goat Coffee': { color: '#DEB887', trim: '#5D4037', awning: '#8B6914' },
      'Journeyman Meats': { color: '#3E2723', trim: '#A0522D', awning: '#5D4037' },
      'Plaza Gourmet': { color: '#FFF8EF', trim: '#01696F', awning: '#20808D' },
      "Mr. Moon's": { color: '#6A5ACD', trim: '#FFD700', awning: '#9370DB' },
      'Fideaux Pets': { color: '#4A8B3F', trim: '#FFF', awning: '#6DAA45' },
      'Running Company': { color: '#FF4500', trim: '#FFF', awning: '#FF6347' },
      'The Matheson': { color: '#2C2C2C', trim: '#C0C0C0', awning: '#444' },
      'Baci Cafe': { color: '#E8D5C4', trim: '#8B0000', awning: '#CD853F' },
      'Little Saint': { color: '#E8F5E9', trim: '#2E7D32', awning: '#4CAF50' },
      'Lime Stone': { color: '#F5F5DC', trim: '#808080', awning: '#B8B8B8' },
      'Punch': { color: '#FF1493', trim: '#FFF', awning: '#FF69B4' },
      'Gallery Lulo': { color: '#F0F0F0', trim: '#333', awning: '#666' },
      'Hotel Healdsburg': { color: '#E8DCC8', trim: '#5D4037', awning: '#D4C5A9' },
      'Spoke Folk Cyclery': { color: '#4169E1', trim: '#FFF', awning: '#6495ED' },
      'Maison Fiori': { color: '#FFF0F5', trim: '#FF69B4', awning: '#FFB6C1' },
      'Shed': { color: '#A0522D', trim: '#DEB887', awning: '#CD853F' },
      'Campo Fina': { color: '#E8D5C4', trim: '#8B0000', awning: '#B22222' },
      "Willi's Seafood": { color: '#4682B4', trim: '#FFF', awning: '#5F9EA0' },
      'Bravas Tapas': { color: '#FF6347', trim: '#FFD700', awning: '#FF4500' },
    };
    const style = styles[this.signText];
    if (style) {
      this.color = style.color;
      this.trimColor = style.trim;
      this.awningColor = style.awning;
      this.hasAwning = true;
    }
  }

  generateWindows() {
    const cols = Math.floor((this.w - 30) / 35);
    for (let floor = 0; floor < this.floors; floor++) {
      for (let col = 0; col < cols; col++) {
        this.windows.push({
          x: 20 + col * 35 + (this.w - 20 - cols * 35) / 2,
          y: this.h - 50 - floor * 80,
          lit: Math.random() > 0.5
        });
      }
    }
  }

  draw(ctx, camX) {
    const sx = this.x - camX;
    if (sx + this.w < -50 || sx > GAME_W + 50) return;
    const baseY = GROUND_Y;

    // Main building body
    ctx.fillStyle = this.color;
    ctx.fillRect(sx, baseY - this.h, this.w, this.h);

    // Brick/stone texture lines
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 1;
    for (let y = baseY - this.h; y < baseY; y += 12) {
      ctx.beginPath();
      ctx.moveTo(sx, y);
      ctx.lineTo(sx + this.w, y);
      ctx.stroke();
    }

    // Side borders / trim
    ctx.fillStyle = this.trimColor;
    ctx.fillRect(sx - 2, baseY - this.h - 8, this.w + 4, 12);
    ctx.fillRect(sx - 2, baseY - this.h - 8, 6, this.h + 8);
    ctx.fillRect(sx + this.w - 4, baseY - this.h - 8, 6, this.h + 8);

    // Roof detail
    if (this.roofStyle === 1) {
      ctx.fillStyle = this.trimColor;
      ctx.beginPath();
      ctx.moveTo(sx - 4, baseY - this.h - 8);
      ctx.lineTo(sx + this.w / 2, baseY - this.h - 35);
      ctx.lineTo(sx + this.w + 4, baseY - this.h - 8);
      ctx.closePath();
      ctx.fill();
    } else if (this.roofStyle === 2) {
      // Cornice
      ctx.fillStyle = this.trimColor;
      ctx.fillRect(sx - 6, baseY - this.h - 15, this.w + 12, 18);
      ctx.fillRect(sx - 4, baseY - this.h - 20, this.w + 8, 8);
    }

    // Windows
    for (const win of this.windows) {
      const wx = sx + win.x;
      const wy = baseY - win.y;
      // Window frame
      ctx.fillStyle = this.trimColor;
      ctx.fillRect(wx - 2, wy - 2, 24, 34);
      // Glass
      ctx.fillStyle = win.lit ? '#FFFDE7' : '#87CEEB';
      ctx.globalAlpha = win.lit ? 0.8 : 0.5;
      ctx.fillRect(wx, wy, 20, 30);
      ctx.globalAlpha = 1;
      // Pane dividers
      ctx.strokeStyle = this.trimColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx + 10, wy);
      ctx.lineTo(wx + 10, wy + 30);
      ctx.moveTo(wx, wy + 15);
      ctx.lineTo(wx + 20, wy + 15);
      ctx.stroke();
      // Sill
      ctx.fillStyle = this.trimColor;
      ctx.fillRect(wx - 3, wy + 30, 26, 4);
    }

    // Door
    const dx = sx + this.doorX - 12;
    ctx.fillStyle = this.trimColor;
    ctx.fillRect(dx - 2, baseY - 55, 28, 55);
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(dx, baseY - 53, 24, 53);
    // Doorknob
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(dx + 19, baseY - 26, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Shop awning
    if (this.hasAwning) {
      ctx.fillStyle = this.awningColor;
      ctx.beginPath();
      ctx.moveTo(sx + 5, baseY - 60);
      ctx.lineTo(sx + this.w - 5, baseY - 60);
      ctx.lineTo(sx + this.w + 5, baseY - 42);
      ctx.lineTo(sx - 5, baseY - 42);
      ctx.closePath();
      ctx.fill();
      // Stripes
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        const lx = sx + 10 + i * (this.w - 10) / 6;
        ctx.beginPath();
        ctx.moveTo(lx, baseY - 60);
        ctx.lineTo(lx + 3, baseY - 42);
        ctx.stroke();
      }
      // Scalloped edge
      ctx.fillStyle = this.awningColor;
      for (let i = 0; i < 8; i++) {
        const cx = sx - 3 + i * (this.w + 8) / 8;
        ctx.beginPath();
        ctx.arc(cx + (this.w + 8) / 16, baseY - 40, 8, 0, Math.PI);
        ctx.fill();
      }
    }

    // Sign
    if (this.signText) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(sx + this.w * 0.15, baseY - this.h + 15, this.w * 0.7, 22);
      ctx.font = '600 11px Inter, sans-serif';
      ctx.fillStyle = '#FFD700';
      // Use white text on dark buildings
      if (['#2E4A2E','#1C1C1C','#3E2723','#2C2C2C','#8B2500','#4682B4','#4169E1','#6A5ACD','#4A8B3F','#FF4500','#FF1493'].includes(this.color)) {
        ctx.fillStyle = '#FFFFFF';
      }
      ctx.textAlign = 'center';
      ctx.fillText(this.signText.split('\n')[0], sx + this.w / 2, baseY - this.h + 32);
      ctx.textAlign = 'left';
    }
  }
}

// ─── GENERATE WORLD ───
let buildings = [];
let platforms = [];
let collectibles = [];
let enemies = [];
let particles = [];
let floatingTexts = [];

function generateWorld() {
  buildings = [];
  platforms = [];
  collectibles = [];
  enemies = [];
  particles = [];
  floatingTexts = [];

  // Generate buildings along the street
  let bx = 100;
  while (bx < WORLD_W - 200) {
    const b = new Building(bx, randInt(0, 4));
    buildings.push(b);
    bx += b.w + randInt(15, 40);
  }

  // Place burger shop further in so player has minnows to spend
  const burgerShopX = 8000;
  burgerShop = {
    x: burgerShopX, y: GROUND_Y, w: 200, h: 200,
    doorX: burgerShopX + 80, doorW: 40,
    playerNear: false
  };

  // Generate platforms (awnings, ledges, crates)
  dogBeds = [];
  for (let i = 0; i < 120; i++) {
    const px = 300 + i * 190 + randInt(-30, 30);
    const py = GROUND_Y - randInt(100, 260);
    const pw = randInt(60, 140);
    platforms.push({ x: px, y: py, w: pw, h: 14, type: randInt(0, 2) });
    // Every ~6th platform gets a dog bed
    if (i % 6 === 3 && pw >= 80) {
      dogBeds.push({ x: px + pw / 2 - 20, y: py, w: 40, h: 12, platformIdx: i });
    }
  }

  // Generate collectibles — lots of ground-level ones so power-ups trigger fast
  for (let i = 0; i < 360; i++) {
    const cx = 200 + rand(0, WORLD_W - 400);
    const onPlatform = Math.random() > 0.65; // 35% on platforms, 65% ground level
    let cy;
    if (onPlatform && platforms.length) {
      const p = platforms[randInt(0, platforms.length - 1)];
      cy = p.y - 30;
      collectibles.push({ x: p.x + p.w / 2, y: cy, type: Math.random() > 0.5 ? 'watermelon' : 'minnow', collected: false, bobPhase: rand(0, Math.PI * 2) });
    } else {
      cy = GROUND_Y - 40;
      collectibles.push({ x: cx, y: cy, type: Math.random() > 0.5 ? 'watermelon' : 'minnow', collected: false, bobPhase: rand(0, Math.PI * 2) });
    }
  }

  // Reset chicken
  chicken = null;
  fartClouds = [];

  // Generate enemies — 20% fewer cats and pigeons for a calmer experience
  for (let i = 0; i < 112; i++) {
    const ex = 400 + rand(0, WORLD_W - 500);
    const type = Math.random() > 0.5 ? 'cat' : 'pigeon';
    enemies.push({
      x: ex, y: type === 'pigeon' ? GROUND_Y - 150 - rand(0, 100) : GROUND_Y,
      type,
      vx: type === 'pigeon' ? rand(-1, 1) : 0,
      vy: 0,

// ─── PARTICLES ───
class Particle {
  constructor(x, y, vx, vy, color, size, life) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.size = size;
    this.life = life; this.maxLife = life;
    this.active = true;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 400 * dt;
    this.life -= dt;
    if (this.life <= 0) this.active = false;
  }
  draw(ctx, camX) {
    const a = this.life / this.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    const s = this.size * a;
    ctx.fillRect(this.x - camX - s / 2, this.y - s / 2, s, s);
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, color, count, spread, speed) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(
      x, y,
      (Math.random() - 0.5) * spread,
      -Math.random() * speed - 50,
      color,
      rand(3, 8),
      rand(0.3, 0.8)
    ));
  }
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1.0, vy: -80 });
}

// ─── DRAWING HELPERS ───

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, SKY_TOP);
  grad.addColorStop(0.7, SKY_BOT);
  grad.addColorStop(1, '#C9A96E');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const cloudOff = camera.x * 0.02;
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 300 + 100 - cloudOff) % (GAME_W + 400)) - 100;
    const cy = 40 + Math.sin(i * 1.7) * 30;
    drawCloud(cx, cy, 40 + i * 5);
  }
}

function drawCloud(x, y, size) {
  ctx.beginPath();
  ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
  ctx.arc(x + size * 0.3, y - size * 0.15, size * 0.4, 0, Math.PI * 2);
  ctx.arc(x - size * 0.35, y + size * 0.05, size * 0.35, 0, Math.PI * 2);
  ctx.arc(x + size * 0.15, y + size * 0.1, size * 0.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround(camX) {
  // Sidewalk
  ctx.fillStyle = SIDEWALK_COLOR;
  ctx.fillRect(0, GROUND_Y, GAME_W, 30);

  // Sidewalk lines
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;

  ctx.fillRect(0, GROUND_Y + 30, GAME_W, 50);

// ─── UPDATE SHOP ───
function updateShop() {
  if (justPressed['ArrowUp'] || justPressed['KeyW'] || touchJumpJustPressed) {
    shopCursor = (shopCursor + 2) % 3;
    playSFX(400, 0.05, 'square', 0.08);
  }
  if (justPressed['ArrowDown'] || justPressed['KeyS'] || touchDownJustPressed) {
    shopCursor = (shopCursor + 1) % 3;
    playSFX(400, 0.05, 'square', 0.08);
  }
  if (justPressed['Space'] || justPressed['Enter'] || touchAttackJustPressed) {
    var availableMinnows = minnowsEaten - minnowsSpent;
    if (shopCursor === 0 && availableMinnows >= 10) {
      minnowsSpent += 10;
      hasFries = true;
      friesTimer = FRIES_DURATION;
      playPowerUp();
      addFloatingText(player.x, player.y - 50, 'GOT FRIES! BARK AT BIRDS!', '#FFD700');
    } else if (shopCursor === 1 && availableMinnows >= 20) {
      minnowsSpent += 20;
      hasBurger = true;
      burgerTimer = BURGER_DURATION;
      playPowerUp();
      addFloatingText(player.x, player.y - 50, 'GOT BURGER! PEE POWER!', '#FF8C00');
    } else if (shopCursor === 2) {
      shakeSpeedTimer = SHAKE_DURATION;
      playPowerUp();
      addFloatingText(player.x, player.y - 50, 'SHAKE SPEED BOOST!', '#FF69B4');
    } else {
      playSFX(100, 0.2, 'sawtooth', 0.1);
    }
  }
  if (justPressed['ArrowLeft'] || justPressed['KeyA'] || justPressed['Backspace']) {
    leaveShop();
  }
}

function leaveShop() {
  gameState = STATE.PLAYING;
  var exitBtn = document.getElementById('exit-shop-btn');
  if (exitBtn) exitBtn.style.display = 'none';

function drawPlatform(p, camX) {
  const sx = p.x - camX;
  if (sx + p.w < -20 || sx > GAME_W + 20) return;

  if (p.type === 0) {
    // Wooden crate platform
    ctx.fillStyle = '#A0522D';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.strokeStyle = '#7B3F00';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, p.y, p.w, p.h);
    for (let cx = 0; cx < p.w; cx += 20) {
      ctx.beginPath();
      ctx.moveTo(sx + cx, p.y);
      ctx.lineTo(sx + cx, p.y + p.h);
      ctx.stroke();
    }

    ctx.fillStyle = '#9E9E9E';

    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#D32F2F';
    ctx.fillRect(sx, p.y, p.w, 5);

    ctx.fillStyle = '#FFCDD2';
    for (let i = 0; i < p.w; i += 16) {
      ctx.fillRect(sx + i, p.y, 8, p.h);

}

// ─── DRAW PLAYER (Chinese Crested Dog) ───
function drawPlayer(camX, time) {
  const p = player;
  const sx = p.x - camX;
  const sy = p.y;

  // Size scaling from minnow size boost
  const sizeScale = 1 + sizeBoostLevel * 0.08;

  ctx.save();
  ctx.translate(sx, sy);
  if (p.facing < 0) {
    ctx.scale(-1, 1);
  }
  ctx.scale(sizeScale, sizeScale);

  // Invincibility flash
  if (invincibleTimer > 0 && Math.sin(invincibleTimer * 20) > 0) {
    ctx.globalAlpha = 0.5;
  }

  const bobY = p.grounded && p.running ? Math.sin(p.anim * 12) * 3 : 0;
  const legPhase = p.running ? p.anim * 10 : 0;

  // ─── KICK MODE: full upright stance on hind legs ───
  if (kickModeTimer > 0) {
    const walkCycle = p.running ? Math.sin(p.anim * 8) * 4 : 0;
    const swayY = Math.sin(time * 4) * 2; // subtle body sway
    const hairWaveK = Math.sin(time * 3 + p.hairPhase) * 5;
    const windOffsetK = p.running ? -p.facing * 6 : 0;

    // Glowing orange aura
    const auraPulse = 0.12 + Math.sin(time * 6) * 0.06;
    ctx.fillStyle = `rgba(255, 87, 34, ${auraPulse})`;
    ctx.beginPath();
    ctx.arc(0, -45 + swayY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255, 140, 0, ${auraPulse * 0.5})`;
    ctx.beginPath();
    ctx.arc(0, -45 + swayY, 55, 0, Math.PI * 2);
    ctx.fill();

    // Shadow (wider for upright stance)
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Hind legs (standing straight, on the ground)
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(-8, -18, 6, 20 + walkCycle);
    ctx.fillRect(2, -18, 6, 20 - walkCycle);
    // Hind paw tufts
    ctx.fillStyle = '#E8E0D0';
    ctx.beginPath();
    ctx.ellipse(-5, 2 + Math.max(0, walkCycle * 0.3), 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(5, 2 - Math.max(0, walkCycle * 0.3), 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Upright torso (vertical ellipse)
    ctx.fillStyle = '#4A4A4A';
    ctx.beginPath();
    ctx.ellipse(0, -42 + swayY, 14, 24, 0, 0, Math.PI * 2);
    ctx.fill();

    // Chest fur / belly marking
    ctx.fillStyle = '#F5F0E8';
    ctx.beginPath();
    ctx.ellipse(2, -34 + swayY, 8, 14, 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Tail (sticks out behind, upward)
    ctx.strokeStyle = '#E8E0D0';
    ctx.lineWidth = 3;
    ctx.beginPath();
    const tailWagK = Math.sin(time * 8) * 8;
    ctx.moveTo(-12, -35 + swayY);
    ctx.quadraticCurveTo(-28, -45 + swayY + tailWagK, -22, -55 + swayY + tailWagK * 0.5);
    ctx.stroke();
    ctx.fillStyle = '#F5F0E8';
    ctx.beginPath();
    ctx.ellipse(-22, -55 + swayY + tailWagK * 0.5, 5, 3, tailWagK * 0.02, 0, Math.PI * 2);
    ctx.fill();

    // Arms (front legs now used as arms) — guard stance
    ctx.fillStyle = '#4A4A4A';
    if (p.attacking) {
      // Kick attack: one arm up in guard, one leg kicks forward
      const kickProgress = 1 - (p.attackTimer / ATTACK_DURATION);
      const kickAngle = Math.sin(kickProgress * Math.PI) * 1.5;

      // Left arm up in guard
      ctx.save();
      ctx.translate(-10, -52 + swayY);
      ctx.rotate(-0.8);
      ctx.fillStyle = '#4A4A4A';
      ctx.fillRect(0, -2, 16, 5);
      ctx.fillStyle = '#E8E0D0';
      ctx.beginPath();
      ctx.ellipse(18, 0, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Right arm punching forward
      ctx.save();
      ctx.translate(10, -50 + swayY);
      ctx.rotate(-0.3 + kickAngle * 0.3);
      ctx.fillStyle = '#4A4A4A';
      ctx.fillRect(0, -2, 18, 5);
      ctx.fillStyle = '#E8E0D0';
      ctx.beginPath();
      ctx.ellipse(20, 0, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Kicking leg extends forward
      ctx.save();
      ctx.translate(4, -20 + swayY);
      ctx.rotate(-kickAngle + 0.3);
      ctx.fillStyle = '#4A4A4A';
      ctx.fillRect(0, -3, 32, 6);
      ctx.fillStyle = '#F5F0E8';
      ctx.beginPath();
      ctx.ellipse(34, 0, 6, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Kick impact lines
      ctx.strokeStyle = 'rgba(255, 87, 34, 0.7)';
      ctx.lineWidth = 2;
      const kickExtend = Math.sin(kickProgress * Math.PI);
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(25 + kickExtend * 20, -18 + swayY - i * 4);
        ctx.lineTo(35 + kickExtend * 25 + i * 4, -22 + swayY - i * 5);
        ctx.stroke();
      }
    } else {
      // Idle fighting stance: arms up like a boxer
      const guardBob = Math.sin(time * 5) * 2;
      // Left arm
      ctx.save();
      ctx.translate(-10, -50 + swayY + guardBob);
      ctx.rotate(-0.6);
      ctx.fillStyle = '#4A4A4A';
      ctx.fillRect(0, -2, 16, 5);
      ctx.fillStyle = '#E8E0D0';
      ctx.beginPath();
      ctx.ellipse(18, 0, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Right arm
      ctx.save();
      ctx.translate(10, -48 + swayY - guardBob);
      ctx.rotate(0.4);
      ctx.fillStyle = '#4A4A4A';
      ctx.fillRect(0, -2, 18, 5);
      ctx.fillStyle = '#E8E0D0';
      ctx.beginPath();
      ctx.ellipse(20, 0, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Neck (shorter, more vertical)
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(-3, -70 + swayY, 8, 10);

    // Head (positioned on top of upright body)
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.ellipse(2, -78 + swayY, 11, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // Snout
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.ellipse(12, -75 + swayY, 6, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(16, -75 + swayY, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Tongue (when attacking)
    if (p.attacking) {
      ctx.fillStyle = '#FF6B8A';
      ctx.beginPath();
      ctx.ellipse(18, -72 + swayY, 3, 4, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Eyes (fierce)
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(6, -80 + swayY, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(7, -81 + swayY, 1, 0, Math.PI * 2);
    ctx.fill();
    // Angry eyebrow
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(3, -84 + swayY);
    ctx.lineTo(9, -83 + swayY);
    ctx.stroke();

    // Ears
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.moveTo(-4, -82 + swayY);
    ctx.lineTo(-8, -100 + swayY);
    ctx.lineTo(3, -85 + swayY);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(6, -84 + swayY);
    ctx.lineTo(12, -102 + swayY);
    ctx.lineTo(14, -85 + swayY);
    ctx.closePath();
    ctx.fill();
    // Inner ears
    ctx.fillStyle = '#FF9FAD';
    ctx.beginPath();
    ctx.moveTo(-3, -83 + swayY);
    ctx.lineTo(-5, -96 + swayY);
    ctx.lineTo(2, -85 + swayY);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(7, -85 + swayY);
    ctx.lineTo(12, -98 + swayY);
    ctx.lineTo(13, -85 + swayY);
    ctx.closePath();
    ctx.fill();

    // Hair/crest (flowing from top of head)
    ctx.fillStyle = '#F5F0E8';
    ctx.beginPath();
    ctx.moveTo(-5, -86 + swayY);
    ctx.quadraticCurveTo(-14 + hairWaveK + windOffsetK, -94 + swayY, -18 + windOffsetK, -88 + swayY + hairWaveK);
    ctx.quadraticCurveTo(-20 + windOffsetK, -80 + swayY + hairWaveK, -14 + windOffsetK, -74 + swayY);
    ctx.quadraticCurveTo(-8 + windOffsetK, -78 + swayY, -2, -78 + swayY);
    ctx.closePath();
    ctx.fill();
    // Flowing strands
    ctx.strokeStyle = '#F5F0E8';
    ctx.lineWidth = 2.5;
    for (let i = 0; i < 4; i++) {
      const stX = -4 + i * 3;
      const stY = -84 + swayY + i * 2;
      const wv = Math.sin(time * 3 + i * 0.7) * (3 + i * 2);
      ctx.beginPath();
      ctx.moveTo(stX, stY);
      ctx.quadraticCurveTo(stX - 8 + windOffsetK + wv, stY + 6, stX - 12 + windOffsetK + wv * 1.5, stY + 12 + i * 3);
      ctx.stroke();
    }

    // "KICK MODE" headband
    ctx.fillStyle = 'rgba(255, 87, 34, 0.9)';
    ctx.fillRect(-12, -82 + swayY, 26, 3);
    // Headband tails flowing behind
    ctx.strokeStyle = 'rgba(255, 87, 34, 0.8)';
    ctx.lineWidth = 2.5;
    const hbWave = Math.sin(time * 5) * 6;
    ctx.beginPath();
    ctx.moveTo(-12, -81 + swayY);
    ctx.quadraticCurveTo(-22 + windOffsetK, -78 + swayY + hbWave, -28 + windOffsetK, -74 + swayY + hbWave * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-12, -80 + swayY);
    ctx.quadraticCurveTo(-20 + windOffsetK, -76 + swayY + hbWave * 0.8, -25 + windOffsetK, -70 + swayY + hbWave * 0.5);
    ctx.stroke();

  } else {
  // ─── NORMAL quadruped stance ───

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (dark grayish skin)
  ctx.fillStyle = '#4A4A4A';
  ctx.beginPath();
  ctx.ellipse(0, -28 + bobY, 18, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  const legColors = '#4A4A4A';
  ctx.fillStyle = legColors;
  // Back legs
  const bl1 = Math.sin(legPhase) * 8;
  const bl2 = Math.sin(legPhase + Math.PI) * 8;
  ctx.fillRect(-12, -16 + bobY, 5, 18 + bl1);
  ctx.fillRect(-4, -16 + bobY, 5, 18 + bl2);
  // Front legs
  ctx.fillRect(5, -16 + bobY, 5, 18 + bl2);
  ctx.fillRect(13, -16 + bobY, 5, 18 + bl1);

  // Leg fur tufts (white puffs at feet)
  ctx.fillStyle = '#E8E0D0';
  for (const lx of [-10, -2, 7, 15]) {
    const legOff = (lx < 0 ? bl1 : bl2);
    ctx.beginPath();
    ctx.ellipse(lx + 2, 2 + bobY + Math.max(0, legOff * 0.5), 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Tail (with flowing fur)
  ctx.strokeStyle = '#E8E0D0';
  ctx.lineWidth = 3;
  ctx.beginPath();
  const tailWag = Math.sin(time * 6) * 10;
  ctx.moveTo(-16, -30 + bobY);
  ctx.quadraticCurveTo(-25, -45 + bobY + tailWag, -20, -55 + bobY + tailWag * 0.5);
  ctx.stroke();
  // Tail fur tuft
  ctx.fillStyle = '#F5F0E8';
  ctx.beginPath();
  ctx.ellipse(-20, -55 + bobY + tailWag * 0.5, 6, 4, tailWag * 0.02, 0, Math.PI * 2);
  ctx.fill();

  // Neck
  ctx.fillStyle = '#4A4A4A';
  ctx.fillRect(10, -38 + bobY, 8, 12);

  // Head
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.ellipse(16, -44 + bobY, 12, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.ellipse(26, -40 + bobY, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Nose
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(31, -40 + bobY, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Tongue (when attacking)
  if (p.attacking) {
    ctx.fillStyle = '#FF6B8A';
    ctx.beginPath();
    ctx.ellipse(33, -37 + bobY, 3, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(20, -46 + bobY, 3, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(21, -47 + bobY, 1, 0, Math.PI * 2);
  ctx.fill();

  // Ears (big, upright)
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.moveTo(10, -48 + bobY);
  ctx.lineTo(5, -68 + bobY);
  ctx.lineTo(16, -52 + bobY);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(20, -50 + bobY);
  ctx.lineTo(24, -70 + bobY);
  ctx.lineTo(28, -52 + bobY);
  ctx.closePath();
  ctx.fill();

  // Inner ears
  ctx.fillStyle = '#FF9FAD';
  ctx.beginPath();
  ctx.moveTo(11, -49 + bobY);
  ctx.lineTo(8, -63 + bobY);
  ctx.lineTo(15, -51 + bobY);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(21, -51 + bobY);
  ctx.lineTo(24, -65 + bobY);
  ctx.lineTo(27, -52 + bobY);
  ctx.closePath();
  ctx.fill();

  // Hair/crest (flowing white mane) — the signature look!
  ctx.fillStyle = '#F5F0E8';
  const hairWave = Math.sin(time * 3 + p.hairPhase) * 5;
  const windOffset = p.running ? -p.facing * 8 : 0;

  // Main crest flowing from top of head
  ctx.beginPath();
  ctx.moveTo(8, -52 + bobY);
  ctx.quadraticCurveTo(0 + hairWave + windOffset, -60 + bobY, -5 + windOffset, -55 + bobY + hairWave);
  ctx.quadraticCurveTo(-10 + windOffset, -48 + bobY + hairWave, -8 + windOffset, -40 + bobY);
  ctx.quadraticCurveTo(-5 + windOffset, -45 + bobY, 5, -44 + bobY);
  ctx.closePath();
  ctx.fill();

  // Long flowing hair strands
  ctx.strokeStyle = '#F5F0E8';
  ctx.lineWidth = 2.5;
  for (let i = 0; i < 5; i++) {
    const startX = 6 + i * 4;
    const startY = -50 + bobY + i * 2;
    const wave = Math.sin(time * 3 + i * 0.7) * (4 + i * 2);
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(
      startX - 10 + windOffset + wave,
      startY + 8,
      startX - 15 + windOffset + wave * 1.5,
      startY + 15 + i * 3
    );
    ctx.stroke();
  }

  // Chest fur / beard
  ctx.fillStyle = '#F5F0E8';
  ctx.beginPath();
  ctx.moveTo(14, -34 + bobY);
  ctx.quadraticCurveTo(20, -24 + bobY, 16 + hairWave * 0.5, -15 + bobY);
  ctx.quadraticCurveTo(10, -18 + bobY, 8, -30 + bobY);
  ctx.closePath();
  ctx.fill();

  // Karate chop attack animation
  if (p.attacking) {
    const attackProgress = 1 - (p.attackTimer / ATTACK_DURATION);
    const chopAngle = Math.sin(attackProgress * Math.PI) * 1.2;

    ctx.save();
    ctx.translate(18, -28 + bobY);
    ctx.rotate(-chopAngle);

    // Extended paw
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(0, -3, 30, 6);
    // Paw tuft
    ctx.fillStyle = '#F5F0E8';
    ctx.beginPath();
    ctx.ellipse(32, 0, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Action lines
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(25, -8 - i * 4);
      ctx.lineTo(35 + i * 5, -12 - i * 5);
      ctx.stroke();
    }

    ctx.restore();
  }

  } // end normal stance

  // Fart mode: green stink aura
  if (fartModeTimer > 0) {
    ctx.fillStyle = 'rgba(124, 179, 66, 0.2)';
    ctx.beginPath();
    ctx.arc(0, -25 + bobY, 40, 0, Math.PI * 2);
    ctx.fill();
  }

  // Flight wings (golden translucent wings with flap animation)
  if (canFly && flyTimer > 0) {
    const flapAngle = Math.sin(time * 10) * 0.4;
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#FFD700';

    // Left wing
    ctx.save();
    ctx.translate(-5, -32 + bobY);
    ctx.rotate(-0.8 + flapAngle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-25, -20, -35, -5);
    ctx.quadraticCurveTo(-25, 5, 0, 0);
    ctx.fill();
    ctx.restore();

    // Right wing
    ctx.save();
    ctx.translate(5, -32 + bobY);
    ctx.rotate(0.8 - flapAngle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(25, -20, 35, -5);
    ctx.quadraticCurveTo(25, 5, 0, 0);
    ctx.fill();
    ctx.restore();

    ctx.globalAlpha = 1;
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── DRAW COLLECTIBLES ───
function drawWatermelon(x, y, camX, time, phase) {
  const sx = x - camX;
  const bob = Math.sin(time * 3 + phase) * 4;
  const yy = y + bob;

  // Glow
  ctx.fillStyle = 'rgba(0, 255, 100, 0.1)';
  ctx.beginPath();
  ctx.arc(sx, yy, 18, 0, Math.PI * 2);
  ctx.fill();

  // Whole watermelon
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath();
  ctx.ellipse(sx, yy, 14, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Stripes
  ctx.strokeStyle = '#1B5E20';
  ctx.lineWidth = 1.5;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(sx + i * 5, yy - 10);
    ctx.quadraticCurveTo(sx + i * 6, yy, sx + i * 5, yy + 10);
    ctx.stroke();
  }

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.ellipse(sx - 4, yy - 4, 6, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawMinnow(x, y, camX, time, phase) {
  const sx = x - camX;
  const bob = Math.sin(time * 4 + phase) * 5;
  const wiggle = Math.sin(time * 8 + phase) * 3;
  const yy = y + bob;

  // Sparkle
  ctx.fillStyle = 'rgba(100, 200, 255, 0.15)';
  ctx.beginPath();
  ctx.arc(sx, yy, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(sx, yy);
  ctx.rotate(wiggle * 0.05);

  // Body
  ctx.fillStyle = '#90CAF9';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail
  ctx.fillStyle = '#64B5F6';
  ctx.beginPath();
  ctx.moveTo(-10, 0);
  ctx.lineTo(-18, -6 + wiggle * 0.5);
  ctx.lineTo(-18, 6 + wiggle * 0.5);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(7, -1, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Silver shine
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, -2, 8, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ─── DRAW ENEMIES ───
function drawCat(enemy, camX, time) {
  const sx = enemy.x - camX;
  const sy = enemy.y;
  if (sx < -60 || sx > GAME_W + 60) return;

  ctx.save();
  ctx.translate(sx, sy);
  if (enemy.patrolDir < 0) ctx.scale(-1, 1);

  if (enemy.flash > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(enemy.flash * 20) * 0.3;
  }

  const walk = Math.sin(time * 5 + enemy.anim) * 4;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#FF8A00';
  ctx.beginPath();
  ctx.ellipse(0, -18, 14, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.fillStyle = '#E67300';
  ctx.fillRect(-10, -10, 4, 12 + walk);
  ctx.fillRect(-3, -10, 4, 12 - walk);
  ctx.fillRect(3, -10, 4, 12 + walk);
  ctx.fillRect(9, -10, 4, 12 - walk);

  // Tail
  ctx.strokeStyle = '#FF8A00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-12, -22);
  ctx.quadraticCurveTo(-22, -35 + Math.sin(time * 4) * 5, -18, -40);
  ctx.stroke();

  // Head
  ctx.fillStyle = '#FF9800';
  ctx.beginPath();
  ctx.arc(12, -26, 9, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#FF8A00';
  ctx.beginPath();
  ctx.moveTo(7, -30); ctx.lineTo(5, -40); ctx.lineTo(12, -33);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(15, -30); ctx.lineTo(18, -40); ctx.lineTo(20, -33);
  ctx.closePath(); ctx.fill();

  // Inner ears
  ctx.fillStyle = '#FFB74D';
  ctx.beginPath();
  ctx.moveTo(8, -31); ctx.lineTo(7, -37); ctx.lineTo(11, -33);
  ctx.closePath(); ctx.fill();

  // Eyes (angry)
  ctx.fillStyle = '#FFEB3B';
  ctx.beginPath();
  ctx.ellipse(10, -27, 2.5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(10, -27, 1, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(17, -23);
  ctx.lineTo(19, -22);
  ctx.lineTo(17, -21);
  ctx.stroke();

  // Whiskers
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.5;
  for (let w = 0; w < 3; w++) {
    ctx.beginPath();
    ctx.moveTo(18, -24 + w * 2);
    ctx.lineTo(28, -26 + w * 3);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPigeon(enemy, camX, time) {
  const sx = enemy.x - camX;
  const sy = enemy.y;
  if (sx < -60 || sx > GAME_W + 60) return;

  ctx.save();
  ctx.translate(sx, sy);
  if (enemy.vx > 0) ctx.scale(-1, 1);

  if (enemy.flash > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(enemy.flash * 20) * 0.3;
  }

  const flapSpeed = enemy.alive ? 8 : 2;
  const wingUp = Math.sin(time * flapSpeed + enemy.anim) * 12;

  // Body
  ctx.fillStyle = '#78909C';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Chest

  ctx.beginPath();
  ctx.arc(34, -40, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(34, -40, 1.5, 0, Math.PI * 2);

}

// ─── UPDATE MORTY ───
function updateMorty(dt) {
  // Check spawn condition: player passes MORTY_SPAWN_X for the first time
  if (!mortyTriggered && player.x >= MORTY_SPAWN_X) {
    mortyTriggered = true;
    // Spawn Morty off-screen to the right, he will run toward player
    morty = {
      x: player.x + 600,
      y: GROUND_Y,
      facing: -1,  // facing left toward player
      vx: 0,
      anim: 0,
      state: 'running', // running | sniffing | leaving | done
      timer: 0,
      sniffDuration: 2.0, // how long he sniffs
      hasGrantedInvincibility: false
    };
    addFloatingText(player.x + 200, GROUND_Y - 100, 'WHO\'S THAT?!', '#FFD700');
  }

  if (!morty || morty.state === 'done') return;

  morty.anim += dt;

  if (morty.state === 'running') {
    // Run toward the player's butt (behind the player)
    const targetX = player.x - player.facing * 30; // behind the player
    const dx = targetX - morty.x;
    morty.facing = dx > 0 ? 1 : -1;
    const speed = 400; // faster than the player
    morty.vx = Math.sign(dx) * Math.min(speed, Math.abs(dx) * 3);
    morty.x += morty.vx * dt;

    // Close enough? Start sniffing
    if (Math.abs(morty.x - targetX) < 20) {
      morty.state = 'sniffing';
      morty.timer = 0;
      morty.facing = player.facing; // face same direction as Peabody (nose to butt)
      addFloatingText(morty.x, morty.y - 60, '*sniff sniff*', '#FFA500');
    }
  }

  if (morty.state === 'sniffing') {
    morty.timer += dt;
    // Stay close to player's butt
    morty.x = player.x - player.facing * 30;
    morty.facing = player.facing;

    // Spawn sniff particles
    if (Math.random() < 0.3) {
      mortySparkles.push({
        x: morty.x + morty.facing * 40,
        y: morty.y - 20 + (Math.random() - 0.5) * 10,
        size: 3 + Math.random() * 3,
        color: Math.random() > 0.5 ? '#FFD700' : '#FFA500',
        life: 0.6,
        maxLife: 0.6,
        vx: (Math.random() - 0.5) * 30,
        vy: -20 - Math.random() * 30
      });
    }

    if (morty.timer >= morty.sniffDuration && !morty.hasGrantedInvincibility) {
      // Grant invincibility!
      morty.hasGrantedInvincibility = true;
      invincibleTimer = MORTY_INVINCIBLE_DURATION;
      addFloatingText(player.x, player.y - 80, 'MORTY POWER!', '#FFD700');
      addFloatingText(player.x, player.y - 100, '5s INVINCIBLE!', '#FFF');
      spawnParticles(player.x, player.y - 30, '#FFD700', 25, 250, 250);
      spawnParticles(player.x, player.y - 30, '#FFF', 15, 200, 200);
      screenShake = 0.2;
      // Big sparkle burst
      for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 / 20) * i;
        mortySparkles.push({
          x: player.x + Math.cos(angle) * 40,
          y: player.y - 30 + Math.sin(angle) * 30,
          size: 4 + Math.random() * 4,
          color: ['#FFD700', '#FFF', '#87CEEB', '#FFB6C1'][Math.floor(Math.random() * 4)],
          life: 1.5,
          maxLife: 1.5,
          vx: Math.cos(angle) * 80,
          vy: Math.sin(angle) * 60 - 40
        });
      }
      morty.state = 'leaving';
      morty.timer = 0;
    }
  }

  if (morty.state === 'leaving') {
    morty.timer += dt;
    // Run off to the right
    morty.facing = 1;
    morty.x += 350 * dt;

    // After running far enough or 4 seconds, mark as done
    if (morty.timer > 4 || morty.x > player.x + 800) {
      morty.state = 'done';
    }
  }

  // Update sparkles
  for (let i = mortySparkles.length - 1; i >= 0; i--) {
    const sp = mortySparkles[i];
    sp.life -= dt;
    sp.x += (sp.vx || 0) * dt;
    sp.y += (sp.vy || 0) * dt;
    if (sp.vy) sp.vy += 50 * dt; // slight gravity
    if (sp.life <= 0) mortySparkles.splice(i, 1);
  }
}

// ─── WIN ANIMATION UPDATE ───
function updateWinAnimation(dt) {
  winAnimTimer += dt;

  if (winAnimPhase === 0) {
    // Phase 0: Peabody auto-runs toward Jessica
    const dx = jessica.x - player.x;
    if (Math.abs(dx) > 30) {
      player.vx = dx > 0 ? 250 : -250;
      player.facing = dx > 0 ? 1 : -1;
    } else {
      // Close enough — jump!
      winAnimPhase = 1;
      winAnimTimer = 0;
      player.vy = -500;
      player.grounded = false;
      player.vx = 0;
    }
    // Gravity still applies
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (player.y >= GROUND_Y) {
      player.y = GROUND_Y;
      player.vy = 0;
      player.grounded = true;
    }
    player.x += player.vx * dt;
  } else if (winAnimPhase === 1) {
    // Phase 1: Jump arc into Jessica's arms
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    player.x += (jessica.x - player.x) * 3 * dt; // home in on Jessica
    if (player.y >= jessica.y - 35) {
      // Landed in her arms
      player.y = jessica.y - 35;
      player.vy = 0;
      player.x = jessica.x;
      winAnimPhase = 2;
      winAnimTimer = 0;
      jessica.reached = true;
      // Burst of hearts
      for (let i = 0; i < 20; i++) {
        winHearts.push({
          x: jessica.x, y: jessica.y - 50,
          vx: (Math.random() - 0.5) * 200,
          vy: -100 - Math.random() * 200,
          life: 1.5 + Math.random() * 1.5,
          size: 10 + Math.random() * 15
        });
      }
    }
  } else if (winAnimPhase === 2) {
    // Phase 2: Celebration — show hearts, then victory screen
    // Update heart particles
    for (let i = winHearts.length - 1; i >= 0; i--) {
      const h = winHearts[i];
      h.x += h.vx * dt;
      h.vy += 80 * dt;
      h.y += h.vy * dt;
      h.life -= dt;
      if (h.life <= 0) winHearts.splice(i, 1);
    }
    // Spawn new hearts occasionally
    if (winAnimTimer < 3 && Math.random() < 0.15) {
      winHearts.push({
        x: jessica.x + (Math.random() - 0.5) * 60,
        y: jessica.y - 40 - Math.random() * 30,
        vx: (Math.random() - 0.5) * 80,
        vy: -60 - Math.random() * 100,
        life: 1 + Math.random() * 1,
        size: 8 + Math.random() * 12
      });
    }
  }

  // Camera follows player during win
  const targetCamX = player.x - GAME_W / 2;
  camera.x = lerp(camera.x, clamp(targetCamX, 0, WORLD_W - GAME_W), camera.smoothing);
}

function handleInitialsInput() {
  if (justPressed['ArrowLeft'] || justPressed['KeyA']) {
    initialsCursor = Math.max(0, initialsCursor - 1);
    playChop();
  }
  if (justPressed['ArrowRight'] || justPressed['KeyD']) {
    initialsCursor = Math.min(3, initialsCursor + 1);
    playChop();
  }
  if (justPressed['ArrowUp'] || justPressed['KeyW'] || touchJumpJustPressed) {
    if (initialsCursor < 3) {
      initialsChars[initialsCursor] = (initialsChars[initialsCursor] + 1) % 26;
      playChop();
    }
  }
  if (justPressed['ArrowDown'] || justPressed['KeyS'] || touchDownJustPressed) {
    if (initialsCursor < 3) {
      initialsChars[initialsCursor] = (initialsChars[initialsCursor] + 25) % 26;
      playChop();
    }
  }
  if (justPressed['Space'] || justPressed['Enter'] || touchAttackJustPressed) {
    if (initialsCursor === 3) {
      // Confirm — save to leaderboard
      const name = initialsChars.map(i => ALPHABET[i]).join('');
      addToLeaderboard(name, score);
      gameState = STATE.MENU;
      playChop();
    } else {
      // Move to next slot
      initialsCursor = Math.min(3, initialsCursor + 1);
      playChop();
    }
  }
}

// Touch handling for initials screen (mobile)
let initialsTouchZones = [];
function getInitialsTouchZones() {
  const slotW = 60;
  const slotH = 70;
  const gap = 16;
  const totalW = slotW * 3 + gap * 2;
  const startX = GAME_W / 2 - totalW / 2;
  const slotY = GAME_H / 2 - 20;
  const zones = [];
  for (let i = 0; i < 3; i++) {
    const x = startX + i * (slotW + gap);
    // Up arrow zone
    zones.push({ x: x, y: slotY - 30, w: slotW, h: 30, action: 'up', slot: i });
    // Letter zone (select this slot)
    zones.push({ x: x, y: slotY, w: slotW, h: slotH, action: 'select', slot: i });
    // Down arrow zone
    zones.push({ x: x, y: slotY + slotH, w: slotW, h: 30, action: 'down', slot: i });
  }
  // DONE button
  zones.push({ x: GAME_W / 2 - 60, y: slotY + slotH + 45, w: 120, h: 40, action: 'done', slot: -1 });
  return zones;
}

function handleInitialsTouch(gameX, gameY) {
  const zones = getInitialsTouchZones();
  for (const z of zones) {
    if (gameX >= z.x && gameX <= z.x + z.w && gameY >= z.y && gameY <= z.y + z.h) {
      if (z.action === 'up') {
        initialsCursor = z.slot;
        initialsChars[z.slot] = (initialsChars[z.slot] + 1) % 26;
        playChop();
      } else if (z.action === 'down') {
        initialsCursor = z.slot;
        initialsChars[z.slot] = (initialsChars[z.slot] + 25) % 26;
        playChop();
      } else if (z.action === 'select') {
        initialsCursor = z.slot;
        // Cycle letter on tap
        initialsChars[z.slot] = (initialsChars[z.slot] + 1) % 26;
        playChop();
      } else if (z.action === 'done') {
        const name = initialsChars.map(i => ALPHABET[i]).join('');
        addToLeaderboard(name, score);
        gameState = STATE.MENU;
        playChop();
      }
      break;
    }
  }
}

// ─── DRAW RACCOON ───
function drawRaccoon(rac, camX, time) {
  const sx = rac.x - camX;
  if (sx < -60 || sx > GAME_W + 60) return;
  ctx.save();
  ctx.translate(sx, rac.y);
  if (rac.facing < 0) ctx.scale(-1, 1);

  // Body (grey)
  ctx.fillStyle = '#808080';
  ctx.fillRect(-14, -24, 28, 18);
  // Head
  ctx.fillStyle = '#A0A0A0';
  ctx.beginPath();
  ctx.arc(16, -24, 10, 0, Math.PI * 2);
  ctx.fill();
  // Mask (black around eyes — iconic raccoon look)
  ctx.fillStyle = '#222';
  ctx.fillRect(10, -28, 14, 5);
  // Eyes (white dots in mask)
  ctx.fillStyle = '#FFF';
  ctx.fillRect(13, -27, 3, 3);
  ctx.fillRect(20, -27, 3, 3);

  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(10, -33, 4, 0, Math.PI * 2);

  ctx.arc(22, -33, 4, 0, Math.PI * 2);

  ctx.fillStyle = '#333';
  ctx.fillRect(24, -24, 3, 2);
  // Striped tail
  const tailSwing = Math.sin(time * 3 + rac.anim) * 8;
  for (let s = 0; s < 4; s++) {
    ctx.fillStyle = s % 2 === 0 ? '#666' : '#333';
    ctx.fillRect(-14 - s * 6, -20 + tailSwing + s * 2, 6, 8);

  ctx.restore();

    ctx.fillStyle = '#555';

    ctx.fillStyle = '#777';
    ctx.fillRect(-15, -24, 30, 6);
    ctx.restore();

    // Spilled food (if not eaten)
    if (can.spilledFood && !can.foodEaten) {
      const fx = can.foodX - camX;
      // Draw a little food pile
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(fx, can.foodY - 4, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(fx + 5, can.foodY - 6, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FF6347';
      ctx.beginPath();
      ctx.arc(fx - 4, can.foodY - 3, 3, 0, Math.PI * 2);
      ctx.fill();
      // Sparkle to attract attention
      ctx.fillStyle = 'rgba(255, 255, 200, ' + (0.5 + 0.5 * Math.sin(Date.now() * 0.005)) + ')';
      ctx.font = '12px serif';
      ctx.fillText('✦', fx - 3, can.foodY - 14);
    }
  }
}
